<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Nhập dữ liệu tạp chí vào Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="fb-init.js"></script>
<script src="import-data.js"></script>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px}h1{font-size:1.3rem}#log{background:#f5f5f5;padding:16px;border-radius:8px;font-size:.82rem;max-height:400px;overflow-y:auto;white-space:pre-wrap}button{padding:12px 24px;background:#7C3AED;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin:12px 0}button:hover{background:#6D28D9}.done{color:#059669;font-weight:700}</style>
</head>
<body>
<h1>📥 Nhập dữ liệu tạp chí HĐGSNN 2025</h1>
<p>Nhập <strong id="totalCount">0</strong> tạp chí từ 2 ngành: Triết học-CTH-XHH và Văn hoá-NT-TDTT</p>
<button onclick="doImport()">Bắt đầu nhập vào Firebase</button>
<div id="log">Chờ bấm nút...</div>
<script>
document.getElementById('totalCount').textContent = IMPORT_DATA.length;
async function doImport(){
  var log = document.getElementById('log');
  log.textContent = 'Đang kết nối Firebase...\n';
  var db = initFB();
  var count = 0;
  for(var i = 0; i < IMPORT_DATA.length; i++){
    var d = IMPORT_DATA[i];
    var j = {name:d.n, issn:d.i, type:d.t, pub:d.p, field:d.f, score:d.s};
    try{
      await db.collection('journals').add(j);
      count++;
      if(count % 10 === 0) log.textContent += count + '/' + IMPORT_DATA.length + ' đã nhập...\n';
      log.scrollTop = log.scrollHeight;
    }catch(e){
      log.textContent += '❌ Lỗi: ' + d.n + ' - ' + e.message + '\n';
    }
  }
  log.textContent += '\n✅ Hoàn tất! Đã nhập ' + count + '/' + IMPORT_DATA.length + ' tạp chí.\n';
  log.textContent += 'Vào tracuu.html để kiểm tra.';
  log.classList.add('done');
}
</script>
</body>
</html>
