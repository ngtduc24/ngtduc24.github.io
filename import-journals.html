<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Quản lý dữ liệu tạp chí — Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="fb-init.js"></script>
<script src="import-data.js"></script>
<style>body{font-family:'Plus Jakarta Sans',sans-serif;max-width:640px;margin:40px auto;padding:20px;background:#FAFAFA;color:#1E1E2E}h1{font-size:1.3rem;color:#7C3AED}h2{font-size:1rem;margin-top:20px;color:#4B5563}#log{background:#fff;padding:16px;border-radius:12px;font-size:.78rem;max-height:400px;overflow-y:auto;white-space:pre-wrap;border:1.5px solid #E5E7EB;margin-top:12px}button{padding:10px 20px;border-radius:10px;color:#fff;border:none;font-size:.82rem;font-weight:700;cursor:pointer;margin:4px;display:inline-flex;align-items:center;gap:6px}.btn-check{background:#059669}.btn-fix{background:#F97316}.btn-add{background:#7C3AED}.btn-danger{background:#EF4444}.stat{display:inline-block;background:#EDE9FE;color:#7C3AED;padding:4px 12px;border-radius:8px;font-weight:700;font-size:.82rem;margin:2px}</style>
</head>
<body>
<h1>📊 Quản lý dữ liệu tạp chí HĐGSNN 2025</h1>
<p>File import có: <span class="stat" id="totalLocal">0</span> tạp chí</p>

<h2>1. Kiểm tra hiện trạng</h2>
<button class="btn-check" onclick="checkData()">🔍 Kiểm tra Firebase</button>

<h2>2. Sửa lỗi</h2>
<button class="btn-fix" onclick="removeDuplicates()">🧹 Xóa bản trùng (giữ lại 1 bản)</button>

<h2>3. Thêm dữ liệu thiếu</h2>
<button class="btn-add" onclick="addMissing()">➕ Thêm tạp chí chưa có</button>

<div id="log">Bấm "Kiểm tra Firebase" để bắt đầu.</div>

<script>
document.getElementById('totalLocal').textContent = IMPORT_DATA.length;

async function checkData(){
  var log = document.getElementById('log');
  log.textContent = '🔍 Đang kiểm tra Firebase...\n';
  var db = initFB();
  var snap = await db.collection('journals').get();
  var total = snap.size;
  var fields = {};
  var nameKeys = {};
  var dupes = 0;
  
  snap.forEach(function(d){
    var j = d.data();
    var f = j.field || 'Không rõ';
    fields[f] = (fields[f]||0) + 1;
    var key = (j.name||'').toLowerCase().trim() + '|||' + (j.field||'');
    if(nameKeys[key]){ dupes++; }
    else{ nameKeys[key] = true; }
  });
  
  log.textContent += '📦 Tổng trên Firebase: ' + total + ' tạp chí\n';
  log.textContent += '⚠️ Bản trùng (cùng tên + ngành): ' + dupes + '\n\n';
  log.textContent += '📂 Theo ngành:\n';
  Object.keys(fields).sort().forEach(function(f){
    log.textContent += '   ' + fields[f] + '  ' + f + '\n';
  });
  
  // Check what's missing from IMPORT_DATA
  var missing = 0;
  IMPORT_DATA.forEach(function(d){
    var key = (d.n||'').toLowerCase().trim() + '|||' + (d.f||'');
    if(!nameKeys[key]) missing++;
  });
  log.textContent += '\n🆕 Tạp chí trong file import chưa có trên Firebase: ' + missing + '\n';
  
  if(dupes > 0) log.textContent += '\n👉 Bấm "Xóa bản trùng" để giữ lại 1 bản mỗi tạp chí.';
  if(missing > 0) log.textContent += '\n👉 Bấm "Thêm tạp chí chưa có" để bổ sung ' + missing + ' tạp chí thiếu.';
  if(dupes === 0 && missing === 0) log.textContent += '\n✅ Dữ liệu đã hoàn chỉnh, không trùng, không thiếu!';
}

async function removeDuplicates(){
  var log = document.getElementById('log');
  log.textContent = '🧹 Đang tìm và xóa bản trùng...\n';
  var db = initFB();
  var snap = await db.collection('journals').get();
  
  var seen = {};
  var toDelete = [];
  
  snap.forEach(function(d){
    var j = d.data();
    var key = (j.name||'').toLowerCase().trim() + '|||' + (j.field||'');
    if(seen[key]){
      toDelete.push(d.ref);
    } else {
      seen[key] = true;
    }
  });
  
  log.textContent += 'Tìm thấy ' + toDelete.length + ' bản trùng cần xóa.\n';
  
  if(toDelete.length === 0){
    log.textContent += '✅ Không có bản trùng nào!\n';
    return;
  }
  
  // Delete in batches
  var count = 0;
  var batch = db.batch();
  var batchCount = 0;
  for(var i = 0; i < toDelete.length; i++){
    batch.delete(toDelete[i]);
    batchCount++;
    if(batchCount >= 400){
      await batch.commit();
      count += batchCount;
      log.textContent += '  Đã xóa ' + count + '/' + toDelete.length + '...\n';
      log.scrollTop = log.scrollHeight;
      batch = db.batch();
      batchCount = 0;
    }
  }
  if(batchCount > 0){
    await batch.commit();
    count += batchCount;
  }
  
  log.textContent += '\n✅ Đã xóa ' + count + ' bản trùng. Dữ liệu gốc vẫn giữ nguyên.\n';
  log.textContent += '👉 Bấm "Kiểm tra Firebase" để xác nhận.\n';
}

async function addMissing(){
  var log = document.getElementById('log');
  log.textContent = '➕ Đang kiểm tra tạp chí chưa có...\n';
  var db = initFB();
  
  // Load existing
  var snap = await db.collection('journals').get();
  var existing = {};
  snap.forEach(function(d){
    var j = d.data();
    var key = (j.name||'').toLowerCase().trim() + '|||' + (j.field||'');
    existing[key] = true;
  });
  
  // Find missing
  var toAdd = [];
  IMPORT_DATA.forEach(function(d){
    var key = (d.n||'').toLowerCase().trim() + '|||' + (d.f||'');
    if(!existing[key]){
      toAdd.push({name:d.n, issn:d.i, type:d.t, pub:d.p, field:d.f, score:d.s});
    }
  });
  
  log.textContent += 'Tìm thấy ' + toAdd.length + ' tạp chí cần thêm.\n';
  
  if(toAdd.length === 0){
    log.textContent += '✅ Tất cả tạp chí đã có trên Firebase!\n';
    return;
  }
  
  // Show what will be added
  var addFields = {};
  toAdd.forEach(function(j){ addFields[j.field] = (addFields[j.field]||0)+1; });
  log.textContent += '\nSẽ thêm:\n';
  Object.keys(addFields).forEach(function(f){
    log.textContent += '   +' + addFields[f] + '  ' + f + '\n';
  });
  log.textContent += '\nĐang nhập...\n';
  
  // Add in batches
  var count = 0;
  var batch = db.batch();
  var batchCount = 0;
  for(var i = 0; i < toAdd.length; i++){
    var ref = db.collection('journals').doc();
    batch.set(ref, toAdd[i]);
    batchCount++;
    if(batchCount >= 400){
      await batch.commit();
      count += batchCount;
      log.textContent += '  Đã thêm ' + count + '/' + toAdd.length + '...\n';
      log.scrollTop = log.scrollHeight;
      batch = db.batch();
      batchCount = 0;
    }
  }
  if(batchCount > 0){
    await batch.commit();
    count += batchCount;
  }
  
  log.textContent += '\n✅ Đã thêm ' + count + ' tạp chí mới!\n';
  log.textContent += '👉 Bấm "Kiểm tra Firebase" để xác nhận.\n';
  log.textContent += '👉 Vào tracuu.html để tra cứu.\n';
}
</script>
</body>
</html>
