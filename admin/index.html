<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="../fb-init.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f3ff;--surface:#fff;--surface2:#f7f9ff;--surface3:#eef1fb;--primary:#4648d4;--primary-lt:#e1e0ff;--primary-dim:#c0c1ff;--secondary:#4d661c;--secondary-lt:#ceee93;--tertiary:#6d5e00;--tertiary-lt:#ffe24c;--text:#111c2d;--text2:#464554;--text3:#767586;--border:#c7c4d7;--border-lt:#e7eeff;--green:#4d661c;--green-lt:#ceee93;--red:#ba1a1a;--red-lt:#ffdad6;--radius:12px;--radius-lg:20px;--shadow:0 4px 20px rgba(70,72,212,.08)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:15px}
.sidebar{width:250px;min-height:100vh;background:var(--primary);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-logo .brand{font-size:1.1rem;font-weight:800;color:#fff}
.sb-logo .sub{font-size:.7rem;color:rgba(255,255,255,.55);margin-top:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-section{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:10px 8px 4px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;color:rgba(255,255,255,.7);font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;width:100%;margin-bottom:1px;transition:background .12s,color .12s}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.sb-item .icon{font-size:18px;flex-shrink:0}
.sb-item.sub{padding-left:28px;font-size:.78rem}
.sb-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.15)}
.sb-user{padding:8px 10px;color:rgba(255,255,255,.75);font-size:.75rem;margin-bottom:6px}
.sb-user b{color:#fff;font-size:.8rem;display:block}
.btn-logout{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:none;cursor:pointer;font-size:.75rem;transition:background .12s}
.btn-logout:hover{background:rgba(255,255,255,.18);color:#fff}
.main{margin-left:250px;flex:1;padding:24px 28px;min-height:100vh;max-width:1100px}
#loginView{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-card{background:var(--surface);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:420px;box-shadow:var(--shadow);border:1px solid var(--border-lt)}
.login-card .logo{font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:4px}
.login-card .sub{font-size:.82rem;color:var(--text2);margin-bottom:24px;line-height:1.6}
.login-card .sub a{color:var(--primary)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
input[type=text],input[type=email],input[type=url],input[type=password],input[type=number],input[type=date],textarea,select{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:.82rem;outline:none;width:100%;transition:border-color .15s;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:var(--primary)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:opacity .12s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--primary-lt);color:var(--primary)}
.btn-danger{background:var(--red-lt);color:var(--red)}
.btn-ghost{background:var(--surface3);color:var(--text);border:1.5px solid var(--border)}
.btn-sm{padding:5px 12px;font-size:.75rem}
.btn-icon{padding:6px;border-radius:6px}
.login-btn{width:100%;justify-content:center;padding:11px;margin-top:6px}
.page-header{margin-bottom:20px}.page-header h1{font-size:1.4rem;font-weight:800;margin-bottom:3px}.page-header p{font-size:.82rem;color:var(--text2)}
.page-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid var(--border-lt);box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:.9rem;font-weight:700;margin-bottom:2px}
.card-sub{font-size:.72rem;color:var(--text3)}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border-lt);box-shadow:var(--shadow)}
.stat-num{font-size:1.6rem;font-weight:800;color:var(--primary);line-height:1;margin-bottom:3px}
.stat-label{font-size:.72rem;color:var(--text3)}
.section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--border-lt)}
.alert{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none;align-items:center;gap:6px;position:sticky;top:0;z-index:10}
.alert.show{display:flex}
.alert-success{background:var(--green-lt);color:var(--green);border:1.5px solid rgba(77,102,28,.2)}
.alert-error{background:var(--red-lt);color:var(--red);border:1.5px solid rgba(186,26,26,.2)}
.tab-view{display:none}.tab-view.active{display:block}
.empty-state{text-align:center;padding:36px;color:var(--text3);border:2px dashed var(--border);border-radius:var(--radius);font-size:.82rem}
.mt-item{border:1px solid var(--border-lt);border-radius:8px;padding:10px 12px;margin-bottom:6px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center}
.mt-item .info{flex:1;min-width:0}.mt-item .name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mt-item .slug{font-size:.7rem;color:var(--text3);margin-top:1px}
.badge-type{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:5px;text-transform:uppercase}
.badge-article{background:var(--secondary-lt);color:var(--secondary)}
.badge-project{background:var(--primary-lt);color:var(--primary)}
.badge-elearning{background:var(--tertiary-lt);color:var(--tertiary)}
.ql-container{font-family:inherit;font-size:.88rem;min-height:200px;border-radius:0 0 8px 8px;border-color:var(--border)}
.ql-toolbar{border-radius:8px 8px 0 0;border-color:var(--border);background:var(--surface2)}
.lesson-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border-lt);border-radius:8px;margin-bottom:4px;background:var(--surface2)}
.lesson-item .l-num{width:22px;height:22px;border-radius:999px;background:var(--primary-lt);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.lesson-item .l-info{flex:1;min-width:0}.lesson-item .l-title{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lesson-item .l-type{font-size:.7rem;color:var(--text3)}
/* Editor form */
.editor-form{background:var(--surface);border:1.5px solid var(--primary-dim);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.editor-form h3{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.editor-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:16px;padding-top:12px;border-top:1.5px solid var(--border-lt)}
/* Image upload */
.img-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.img-upload-area:hover{border-color:var(--primary);background:var(--primary-lt)}
.img-upload-area.has-img{padding:8px}
.img-upload-area img{max-height:120px;border-radius:8px;object-fit:cover}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-area .upload-text{font-size:.78rem;color:var(--text3)}
.img-upload-area .upload-icon{font-size:28px;color:var(--primary);opacity:.5}
.img-upload-spinner{display:none;font-size:.75rem;color:var(--primary);padding:6px 0}
/* Modal only for menu & lesson */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.active{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-box.wide{max-width:900px}
.modal-box h3{font-size:1rem;font-weight:800;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:16px;padding-top:12px;border-top:1.5px solid var(--border-lt)}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:var(--border-lt)}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:14px}.stats-row{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginView">
<div class="login-card">
  <div class="logo">🎨 Portfolio Admin</div>
  <p class="sub">Đăng nhập bằng email và mật khẩu.</p>
  <div class="fg"><label>Email</label><input type="email" id="lEmail" placeholder="admin@example.com"></div>
  <div class="fg"><label>Mật khẩu</label><input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <div id="loginErr" style="color:var(--red);font-size:.78rem;display:none;padding:6px 10px;background:var(--red-lt);border-radius:6px;margin-bottom:6px"></div>
  <button class="btn btn-primary login-btn" onclick="doLogin()"><span class="material-symbols-outlined" style="font-size:16px">login</span>Đăng nhập</button>
  <div style="text-align:center;margin-top:10px"><a href="#" onclick="toggleRegister()" style="color:var(--primary);font-size:.78rem;font-weight:600" id="toggleLink">Tạo tài khoản mới</a></div>
  <div id="registerBox" style="display:none;margin-top:10px;padding-top:10px;border-top:1.5px solid var(--border-lt)">
    <p style="font-size:.75rem;color:var(--text2);margin-bottom:8px">Tạo tài khoản admin mới (chỉ cần làm 1 lần)</p>
    <div class="fg"><label>Email</label><input type="email" id="rEmail" placeholder="admin@example.com"></div>
    <div class="fg"><label>Mật khẩu (≥6 ký tự)</label><input type="password" id="rPass" placeholder="••••••••"></div>
    <button class="btn btn-primary login-btn" onclick="doRegister()" style="background:var(--green)"><span class="material-symbols-outlined" style="font-size:16px">person_add</span>Tạo tài khoản</button>
  </div>
  <div id="ghTokenBox" style="display:none;margin-top:10px;padding-top:10px;border-top:1.5px solid var(--border-lt)">
    <p style="font-size:.72rem;color:var(--text3)">GitHub token (tuỳ chọn, chỉ cần nếu upload ảnh lên GitHub)</p>
    <div class="fg"><label>GitHub Username</label><input type="text" id="lUser" placeholder="username"></div>
    <div class="fg"><label>Repository</label><input type="text" id="lRepo" placeholder="username.github.io"></div>
    <div class="fg"><label>Token</label><input type="password" id="lToken" placeholder="ghp_..."></div>
    <button class="btn btn-ghost" onclick="saveGHToken()" style="width:100%;justify-content:center;margin-top:4px">Lưu GitHub token</button>
  </div>
</div>
</div>
<div class="sidebar" id="sidebar" style="display:none">
  <div class="sb-logo"><div class="brand">Portfolio Admin</div><div class="sub" id="sbUser">—</div></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-footer"><div class="sb-user"><b id="sbName">—</b></div><button class="btn-logout" onclick="doLogout()"><span class="material-symbols-outlined" style="font-size:16px">logout</span>Đăng xuất</button></div>
</div>
<div class="main" id="mainArea" style="display:none">
<div id="alertBox" class="alert"></div>
<div id="tabContainer"></div>
</div>
<!-- MODALS (only for menu and lesson - everything else is inline) -->
<div class="modal-overlay" id="menuModal"><div class="modal-box"><button class="modal-close" onclick="closeModal('menuModal')">✕</button><h3 id="mmTitle">Thêm Menu</h3><input type="hidden" id="mm-edit-id"><input type="hidden" id="mm-parent-id"><div class="fg"><label>Tên menu *</label><input type="text" id="mm-label" oninput="autoSlug()"></div><div class="fg"><label>Slug *</label><input type="text" id="mm-slug"><small style="color:var(--text3);font-size:.7rem">Chữ thường, số, dấu gạch ngang</small></div><div class="fg"><label>Dạng trang *</label><select id="mm-type"><option value="article">📝 Bài viết</option><option value="project">🎨 Dự án</option><option value="elearning">📚 Khóa học</option></select></div><div class="fg"><label>Menu cha</label><select id="mm-parent"><option value="">— Menu chính —</option></select></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('menuModal')">Huỷ</button><button class="btn btn-primary" onclick="saveMenu()">Lưu</button></div></div></div>
<div class="modal-overlay" id="lessonModal"><div class="modal-box wide"><button class="modal-close" onclick="closeModal('lessonModal')">✕</button><h3 id="lmTitle">Thêm bài học</h3><input type="hidden" id="lm-slug"><input type="hidden" id="lm-course-idx"><input type="hidden" id="lm-edit-idx" value="-1"><div class="fr"><div class="fg"><label>Tiêu đề *</label><input type="text" id="lm-title"></div><div class="fg"><label>Loại</label><select id="lm-type" onchange="toggleLessonType()"><option value="video">Video</option><option value="article">Bài viết</option></select></div></div><div class="fg" id="lm-video-group"><label>URL Video (YouTube embed)</label><input type="url" id="lm-video" placeholder="https://www.youtube.com/embed/..."></div><div class="fg"><label>Thời lượng</label><input type="text" id="lm-duration" placeholder="15 phút"></div><div class="fg"><label>Nội dung bài học</label><div id="lm-editor" style="height:250px"></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('lessonModal')">Huỷ</button><button class="btn btn-primary" onclick="saveLesson()">Lưu bài học</button></div></div></div>

<script>
'use strict';
var AUTH=null,DATA={},_fileSha=null,_quill=null,_lessonQuill=null;
var CONTENT_PATH='data/content.json';
var IMG_PATH='images/';
function v(id){return(document.getElementById(id)||{}).value?.trim()||'';}
function set(id,val){var e=document.getElementById(id);if(e)e.value=val!=null?val:'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,4);}
function showAlert(m,t){var e=document.getElementById('alertBox');e.textContent=m;e.className='alert alert-'+t+' show';clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},4000);}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
document.querySelectorAll('.modal-overlay').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)closeModal(m.id);});});

// ── Auth ──
async function doLogin(){
  var email=v('lEmail'),pass=v('lPass');
  if(!email||!pass){loginErr('Nhập email và mật khẩu.');return;}
  try{
    await firebase.auth().signInWithEmailAndPassword(email,pass);
    // Load GitHub token from Firestore if saved
    try{var db=initFB();var snap=await db.collection('config').doc('github').get();if(snap.exists){AUTH=snap.data();localStorage.setItem('pa',JSON.stringify(AUTH));}}catch(e){}
    startApp();
  }catch(e){
    var msg='Lỗi đăng nhập.';
    if(e.code==='auth/user-not-found')msg='Email chưa đăng ký. Bấm "Tạo tài khoản mới".';
    else if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='Mật khẩu sai.';
    else if(e.code==='auth/invalid-email')msg='Email không hợp lệ.';
    else if(e.code==='auth/too-many-requests')msg='Quá nhiều lần thử. Đợi vài phút.';
    loginErr(msg);
  }
}
function toggleRegister(){
  var box=document.getElementById('registerBox');
  box.style.display=box.style.display==='none'?'block':'none';
}
async function doRegister(){
  var email=v('rEmail'),pass=v('rPass');
  if(!email||!pass){loginErr('Nhập email và mật khẩu.');return;}
  if(pass.length<6){loginErr('Mật khẩu ít nhất 6 ký tự.');return;}
  try{
    await firebase.auth().createUserWithEmailAndPassword(email,pass);
    loginErr('');showAlert('Tài khoản đã tạo! Đang đăng nhập...','success');
    startApp();
  }catch(e){
    var msg='Lỗi tạo tài khoản.';
    if(e.code==='auth/email-already-in-use')msg='Email đã được sử dụng.';
    else if(e.code==='auth/weak-password')msg='Mật khẩu quá yếu (≥6 ký tự).';
    loginErr(msg);
  }
}
async function saveGHToken(){
  var user=v('lUser'),repo=v('lRepo'),token=v('lToken');
  if(!user||!repo||!token){showAlert('Nhập đầy đủ GitHub info!','error');return;}
  AUTH={user:user,repo:repo,token:token};
  localStorage.setItem('pa',JSON.stringify(AUTH));
  try{var db=initFB();await db.collection('config').doc('github').set(AUTH);showAlert('Đã lưu GitHub token!','success');}catch(e){showAlert('Lỗi: '+e.message,'error');}
}
function loginErr(m){var e=document.getElementById('loginErr');e.textContent=m;e.style.display='block';}
async function doLogout(){try{await firebase.auth().signOut();}catch(e){}localStorage.removeItem('pa');location.reload();}
window.addEventListener('DOMContentLoaded',function(){
  initFB();
  firebase.auth().onAuthStateChanged(function(user){
    if(user){
      var s=localStorage.getItem('pa');if(s)try{AUTH=JSON.parse(s);}catch(e){}
      startApp();
    }
  });
});

async function startApp(){
  document.getElementById('loginView').style.display='none';document.getElementById('sidebar').style.display='flex';document.getElementById('mainArea').style.display='block';
  var fbUser=firebase.auth().currentUser;
  document.getElementById('sbUser').textContent=fbUser?fbUser.email:'Admin';
  document.getElementById('sbName').textContent=fbUser?fbUser.email.split('@')[0]:'Admin';
  // Show GitHub token setup if not configured
  if(!AUTH||!AUTH.token){document.getElementById('ghTokenBox')&&(document.getElementById('ghTokenBox').style.display='none');}
  initFB();
  await loadData();await fbLoadMessages();renderApp();
}

// ── GitHub API ──
function ghFetch(p,o){o=o||{};return fetch('https://api.github.com/'+p,Object.assign({},o,{headers:Object.assign({Authorization:'token '+AUTH.token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},o.headers||{})}));}
function toB64(s){var b=new TextEncoder().encode(s);var r='';b.forEach(function(c){r+=String.fromCharCode(c);});return btoa(r);}
function fromB64(b){var bin=atob(b.replace(/\n/g,''));var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder().decode(bytes);}
async function loadData(){
  try{
    var db=initFB();
    var configSnap=await db.collection('config').doc('site').get();
    var config=configSnap.exists?configSnap.data():{};
    var itemsSnap=await db.collection('items').orderBy('createdAt','desc').get();
    var allItems=[];itemsSnap.forEach(function(d){var it=d.data();it.id=d.id;allItems.push(it);});
    var pagesMeta=config.pages_meta||{};
    var pages={};
    Object.keys(pagesMeta).forEach(function(slug){

// ── IMAGE UPLOAD to GitHub ──
async function uploadImageToGH(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=async function(){
      var b64=reader.result.split(',')[1];
      var fname=uid()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'');
      var path=IMG_PATH+fname;
      try{
        var r=await ghFetch('repos/'+AUTH.user+'/'+AUTH.repo+'/contents/'+path,{method:'PUT',body:JSON.stringify({message:'Upload image: '+fname,content:b64})});
        if(!r.ok)throw new Error('Upload failed');
        var d=await r.json();
        resolve(d.content.download_url);
      }catch(e){reject(e);}
    };
    reader.onerror=function(){reject(new Error('Read failed'));};
    reader.readAsDataURL(file);
  });
}

function imgUploadHTML(currentUrl,inputId){
  var hasImg=currentUrl&&currentUrl.length>5;
  return '<div class="fg"><label>Ảnh bìa</label>'
    +'<div class="img-upload-area'+(hasImg?' has-img':'')+'" id="'+inputId+'-area" onclick="document.getElementById(\''+inputId+'-file\').click()">'
    +(hasImg?'<img src="'+esc(currentUrl)+'" id="'+inputId+'-preview">':'<span class="material-symbols-outlined upload-icon">cloud_upload</span><span class="upload-text">Nhấn để tải ảnh lên hoặc kéo thả</span>')
    +'<input type="file" id="'+inputId+'-file" accept="image/*" onchange="handleImgUpload(this,\''+inputId+'\')">'
    +'</div>'
    +'<div class="img-upload-spinner" id="'+inputId+'-spinner">⏳ Đang tải ảnh lên GitHub...</div>'
    +'<input type="hidden" id="'+inputId+'" value="'+esc(currentUrl||'')+'">'
    +'</div>';
}

async function handleImgUpload(fileInput,inputId){
  var file=fileInput.files[0];if(!file)return;
  var spinner=document.getElementById(inputId+'-spinner');
  var area=document.getElementById(inputId+'-area');
  spinner.style.display='block';
  try{
    var url=await uploadImageToGH(file);
    document.getElementById(inputId).value=url;
    area.innerHTML='<img src="'+url+'" id="'+inputId+'-preview"><input type="file" id="'+inputId+'-file" accept="image/*" onchange="handleImgUpload(this,\''+inputId+'\')">';
    area.classList.add('has-img');
    showAlert('Ảnh đã tải lên!','success');
  }catch(e){showAlert('Lỗi tải ảnh: '+e.message,'error');}
  spinner.style.display='none';
}

async function savePageItem(){
  if(!_editingItem)return;
  var slug=_editingItem.slug,idx=_editingItem.idx;
  if(!v('pi-title')){showAlert('Nhập tiêu đề!','error');return;}
  var page=DATA.pages[slug];if(!page)return;if(!page.items)page.items=[];
  var pt=page.page_type,item={id:uid()};
  if(pt==='article'){
    item.title=v('pi-title');item.excerpt=v('pi-excerpt');item.content=_quill?_quill.root.innerHTML:'';
    item.category=v('pi-cat');item.author=v('pi-author');item.date=v('pi-date');item.read_time=parseInt(v('pi-rt'))||5;
    item.image=v('pi-img');item.tags=v('pi-tags')?v('pi-tags').split(',').map(function(t){return t.trim();}).filter(Boolean):[];
    item.featured=v('pi-feat')==='1';
  }else if(pt==='project'){
    item.title=v('pi-title');item.description=v('pi-desc');item.client=v('pi-client');item.category=v('pi-cat');
    item.date=v('pi-date');item.link=v('pi-link')||'#';
    item.tags=v('pi-tags')?v('pi-tags').split(',').map(function(t){return t.trim();}).filter(Boolean):[];
    item.image=v('pi-img');item.featured=v('pi-feat')==='1';
  }else{
    item.title=v('pi-title');item.description=v('pi-desc');item.instructor=v('pi-inst');item.level=v('pi-level');
    item.duration=v('pi-dur');item.price=v('pi-price');item.status=v('pi-status')||'open';item.link=v('pi-link')||'#';
    item.date=v('pi-date');item.image=v('pi-img');item.featured=v('pi-feat')==='1';
    item.lessons=(idx>=0&&page.items[idx])?page.items[idx].lessons||[]:[];
    item.lessons_count=item.lessons.length;
  }
  item.pageSlug=slug;item.pageType=pt;
  if(idx>=0){item.id=page.items[idx].id||item.id;if(pt==='elearning')item.lessons=page.items[idx].lessons||[];}
  try{
    var savedId=await saveItem(item);
    item.id=savedId;
    if(idx>=0)page.items[idx]=item;else page.items.unshift(item);
    _editingItem=null;_quill=null;
    await saveData();showAlert('Đã lưu!','success');renderApp();
  }catch(e){showAlert('Lỗi: '+e.message,'error');}
}

function openLessonsManager(slug,courseIdx){
  var page=DATA.pages[slug];if(!page)return;
  var course=page.items[courseIdx];if(!course)return;
  if(!course.lessons)course.lessons=[];
  document.getElementById('lmTitle').textContent='Bài học: '+course.title;
  var el=document.getElementById('lessonModal').querySelector('.modal-box');el.className='modal-box wide';
  var body=el.querySelector('.modal-footer').previousElementSibling||document.createElement('div');
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:.82rem;color:var(--text3)">'+course.lessons.length+' bài học</span><button class="btn btn-primary btn-sm" onclick="openLessonEditor(\''+esc(slug)+'\','+courseIdx+')"><span class="material-symbols-outlined" style="font-size:14px">add</span>Thêm bài</button></div>';
  if(!course.lessons.length){html+='<div class="empty-state">Chưa có bài học.</div>';}
  else{course.lessons.sort(function(a,b){return(a.order||0)-(b.order||0);}).forEach(function(l,i){
    var icon=l.type==='video'?'play_circle':'description';
    html+='<div class="lesson-item"><div class="l-num">'+(i+1)+'</div><div class="l-info"><div class="l-title">'+esc(l.title)+'</div><div class="l-type"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle">'+icon+'</span> '+esc(l.type)+' · '+esc(l.duration||'')+'</div></div><div class="card-actions"><button class="btn btn-ghost btn-sm btn-icon" onclick="openLessonEditor(\''+esc(slug)+'\','+courseIdx+','+i+')"><span class="material-symbols-outlined" style="font-size:14px">edit</span></button><button class="btn btn-danger btn-sm btn-icon" onclick="delLesson(\''+esc(slug)+'\','+courseIdx+','+i+')"><span class="material-symbols-outlined" style="font-size:14px">delete</span></button></div></div>';
  });}
  // Replace content between h3 and modal-footer
  var h3=el.querySelector('h3');var mf=el.querySelector('.modal-footer');
  var container=document.createElement('div');container.id='lmBody';container.innerHTML=html;
  var old=document.getElementById('lmBody');if(old)old.remove();
  h3.after(container);
  mf.innerHTML='<button class="btn btn-ghost" onclick="closeModal(\'lessonModal\')">Đóng</button>';
  openModal('lessonModal');
}

function openLessonEditor(slug,courseIdx,lessonIdx){
  closeModal('lessonModal');
  var course=DATA.pages[slug].items[courseIdx];
  var lesson=lessonIdx!=null?course.lessons[lessonIdx]:null;
  set('lm-slug',slug);set('lm-course-idx',courseIdx);set('lm-edit-idx',lessonIdx!=null?lessonIdx:-1);
  document.getElementById('lmTitle').textContent=lesson?'Sửa bài học':'Thêm bài học';
  set('lm-title',lesson?lesson.title:'');set('lm-type',lesson?lesson.type:'video');
  set('lm-video',lesson?lesson.video_url:'');set('lm-duration',lesson?lesson.duration:'');
  toggleLessonType();
  openModal('lessonModal');
  setTimeout(function(){
    if(_lessonQuill){_lessonQuill=null;}
    var el=document.getElementById('lm-editor');if(!el)return;el.innerHTML='';
    _lessonQuill=new Quill('#lm-editor',{theme:'snow',modules:{toolbar:[['bold','italic','underline'],[{header:1},{header:2},{header:3}],[{list:'ordered'},{list:'bullet'}],['link','image'],['clean']]}});
    if(lesson&&lesson.content)_lessonQuill.root.innerHTML=lesson.content;
  },150);
}
function toggleLessonType(){document.getElementById('lm-video-group').style.display=v('lm-type')==='video'?'block':'none';}
function saveLesson(){
  if(!v('lm-title')){showAlert('Nhập tiêu đề!','error');return;}
  var slug=v('lm-slug'),cIdx=parseInt(v('lm-course-idx')),lIdx=parseInt(v('lm-edit-idx'));
  var course=DATA.pages[slug].items[cIdx];if(!course.lessons)course.lessons=[];
  var lesson={id:uid(),title:v('lm-title'),type:v('lm-type'),video_url:v('lm-video'),content:_lessonQuill?_lessonQuill.root.innerHTML:'',duration:v('lm-duration'),order:lIdx>=0?course.lessons[lIdx].order:course.lessons.length+1};
  if(lIdx>=0){lesson.id=course.lessons[lIdx].id||lesson.id;course.lessons[lIdx]=lesson;}
  else course.lessons.push(lesson);
  course.lessons_count=course.lessons.length;
  trySave(function(){closeModal('lessonModal');setTimeout(function(){openLessonsManager(slug,cIdx);},100);});
}
function delLesson(slug,cIdx,lIdx){if(!confirm('Xoá bài học?'))return;var c=DATA.pages[slug].items[cIdx];c.lessons.splice(lIdx,1);c.lessons_count=c.lessons.length;trySave(function(){openLessonsManager(slug,cIdx);});}

    var isRead=msg.read;
    var d=msg.date?new Date(msg.date):null;
    var dateStr=d?d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    html+='<div class="card" style="border-left:4px solid '+(isRead?'var(--border)':'var(--primary)')+';'+(isRead?'opacity:.75':'')+'">';
    html+='<div class="card-header"><div><div class="card-title" style="display:flex;align-items:center;gap:6px">'+(isRead?'':'<span style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0"></span>')+esc(msg.name||'Ẩn danh')+'</div><div class="card-sub">'+esc(msg.email||'')+' · '+dateStr+'</div></div>';
    html+='<div class="card-actions">';
    if(!isRead)html+='<button class="btn btn-ghost btn-sm btn-icon" title="Đánh dấu đã đọc" onclick="markRead('+i+')"><span class="material-symbols-outlined" style="font-size:14px">check</span></button>';
    html+='<button class="btn btn-ghost btn-sm btn-icon" title="Trả lời email" onclick="replyMsg('+i+')"><span class="material-symbols-outlined" style="font-size:14px">reply</span></button>';
    html+='<button class="btn btn-danger btn-sm btn-icon" title="Xoá" onclick="delMsg('+i+')"><span class="material-symbols-outlined" style="font-size:14px">delete</span></button>';
    html+='</div></div>';
    html+='<div style="font-size:.88rem;line-height:1.6;color:var(--text);white-space:pre-wrap;padding:4px 0">'+esc(msg.message||'')+'</div>';
    html+='</div>';
  });
  return html;
}

async function markRead(i){try{await updateMessage(_messages[i]._docId,{read:true});_messages[i].read=true;_msgCount=_messages.filter(function(m){return !m.read;}).length;showAlert('Đã đọc','success');renderApp();}catch(e){showAlert('Lỗi: '+e.message,'error');}}
async function markAllRead(){try{for(var i=0;i<_messages.length;i++){if(!_messages[i].read)await updateMessage(_messages[i]._docId,{read:true});_messages[i].read=true;}_msgCount=0;showAlert('Tất cả đã đọc','success');renderApp();}catch(e){showAlert('Lỗi: '+e.message,'error');}}
async function delMsg(i){if(!confirm('Xoá tin nhắn này?'))return;try{await deleteMessage(_messages[i]._docId);_messages.splice(i,1);_msgCount=_messages.filter(function(m){return !m.read;}).length;showAlert('Đã xoá','success');renderApp();}catch(e){showAlert('Lỗi: '+e.message,'error');}}
async function clearAllMessages(){if(!confirm('Xoá tất cả tin nhắn?'))return;try{await deleteAllMessages();_messages=[];_msgCount=0;showAlert('Đã xoá tất cả','success');renderApp();}catch(e){showAlert('Lỗi: '+e.message,'error');}}
function replyMsg(i){var msg=_messages[i];if(msg.email)window.open('mailto:'+encodeURIComponent(msg.email)+'?subject='+encodeURIComponent('Re: Tin nhắn từ '+msg.name)+'&body='+encodeURIComponent('\n\n---\nTin nhắn gốc:\n'+msg.message));}

async function doMigrate(){
  if(!confirm('Chuyển dữ liệu từ content.json sang Firebase? Dữ liệu hiện có trên Firebase sẽ được ghi đè.'))return;
  showAlert('Đang chuyển dữ liệu...','success');
  try{
    var ok=await migrateFromJSON('../data/content.json');
    if(ok){showAlert('Chuyển dữ liệu thành công! Đang tải lại...','success');setTimeout(function(){location.reload();},1500);}
    else{showAlert('Không tìm thấy content.json','error');}
  }catch(e){showAlert('Lỗi: '+e.message,'error');}
}

async function saveGHSettings(){
  var user=v('s-ghuser'),repo=v('s-ghrepo'),token=v('s-ghtoken');
  if(!user||!repo||!token){showAlert('Nhập đầy đủ!','error');return;}
  AUTH={user:user,repo:repo,token:token};
  localStorage.setItem('pa',JSON.stringify(AUTH));
  try{var db=initFB();await db.collection('config').doc('github').set(AUTH);showAlert('Đã lưu GitHub token!','success');}catch(e){showAlert('Lỗi: '+e.message,'error');}
}

</script>
