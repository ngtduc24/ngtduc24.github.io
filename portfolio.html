<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio - CreativeHub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors": {
        "on-primary-fixed":"#07006c","error-container":"#ffdad6","outline-variant":"#c7c4d7",
        "tertiary-fixed-dim":"#e2c62d","on-secondary-container":"#536d22","surface-container-high":"#dee8ff",
        "tertiary-container":"#c4aa01","surface":"#f9f9ff","primary":"#4648d4",
        "surface-container-lowest":"#ffffff","secondary-fixed-dim":"#b3d17a","tertiary-fixed":"#ffe24c",
        "on-primary":"#ffffff","error":"#ba1a1a","background":"#f9f9ff","primary-fixed":"#e1e0ff",
        "on-tertiary-container":"#4a3f00","on-surface-variant":"#464554","surface-container-low":"#f0f3ff",
        "on-secondary-fixed":"#131f00","on-error":"#ffffff","surface-container":"#e7eeff",
        "primary-container":"#6063ee","on-secondary-fixed-variant":"#364e03","on-primary-fixed-variant":"#2f2ebe",
        "secondary-fixed":"#ceee93","on-surface":"#111c2d","on-background":"#111c2d",
        "surface-dim":"#cfdaf2","secondary-container":"#ceee93","surface-bright":"#f9f9ff",
        "outline":"#767586","on-error-container":"#93000a","on-tertiary":"#ffffff",
        "surface-container-highest":"#d8e3fb","tertiary":"#6d5e00","surface-variant":"#d8e3fb",
        "inverse-primary":"#c0c1ff","surface-tint":"#494bd6","on-primary-container":"#fffbff",
        "on-secondary":"#ffffff","inverse-on-surface":"#ecf1ff","inverse-surface":"#263143",
        "secondary":"#4d661c","primary-fixed-dim":"#c0c1ff","on-tertiary-fixed":"#211b00",
        "on-tertiary-fixed-variant":"#524600"
      },
      borderRadius: { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" },
      spacing: { "section-gap":"80px","max-width":"1280px","container-padding":"24px","unit":"8px","gutter":"20px" },
      fontFamily: { "label-bold":["Plus Jakarta Sans"],"body-md":["Plus Jakarta Sans"],"headline-lg":["Plus Jakarta Sans"],"display-lg":["Plus Jakarta Sans"],"body-lg":["Plus Jakarta Sans"],"headline-md":["Plus Jakarta Sans"] },
      fontSize: {
        "label-bold":["14px",{"lineHeight":"1.0","fontWeight":"700"}],
        "body-md":["16px",{"lineHeight":"1.5","fontWeight":"400"}],
        "headline-lg":["40px",{"lineHeight":"1.2","letterSpacing":"-0.01em","fontWeight":"700"}],
        "display-lg":["56px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"800"}],
        "body-lg":["18px",{"lineHeight":"1.6","fontWeight":"400"}],
        "headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}]
      }
    }
  }
}
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.ambient-shadow { box-shadow: 0 20px 40px rgba(70, 72, 212, 0.08); }
.ambient-shadow-heavy { box-shadow: 0 30px 60px rgba(70, 72, 212, 0.12); }
.inner-glow { box-shadow: inset 1px 1px 0px rgba(255,255,255,0.5), inset -1px -1px 0px rgba(0,0,0,0.05); }
.glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
.bg-gradient-electric { background: linear-gradient(135deg, #6063ee 0%, #4648d4 100%); }
.bg-gradient-lime { background: linear-gradient(135deg, #ceee93 0%, #b3d17a 100%); }
#navMenu > div { position: relative; display: inline-block; }
#navMenu .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; min-width: 200px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 8px 0; z-index: 60; }
#navMenu > div:hover .dropdown-menu { display: block; }
#navMenu .dropdown-menu a { display: block; padding: 10px 20px; color: #111c2d; font-weight: 600; font-size: 14px; white-space: nowrap; text-decoration: none; }
#navMenu .dropdown-menu a:hover { background: #eef2ff; color: #4648d4; }
</style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col pt-20">

<!-- HEADER -->
<header class="bg-surface/80 backdrop-blur-md shadow-[0_20px_40px_rgba(70,72,212,0.1)] fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-20 max-w-max-width mx-auto">
<div class="flex items-center gap-8">
  <a href="index.html" class="font-display-lg text-headline-md font-extrabold text-primary" id="navBrand">CreativeHub</a>
  <nav class="hidden md:flex gap-1 items-center" id="navMenu"></nav>
</div>
<div class="flex items-center gap-4">
  <button class="bg-gradient-electric text-on-primary font-label-bold text-label-bold px-6 py-3 rounded-full inner-glow hover:scale-105 transition-transform duration-300 shadow-md">Sign In</button>
</div>
</header>

<main class="flex-grow w-full max-w-max-width mx-auto px-container-padding py-12 flex flex-col gap-section-gap" id="portfolioMain">
  <div class="flex items-center gap-3 text-on-surface-variant py-20 justify-center">
    <span class="material-symbols-outlined animate-spin">progress_activity</span>
    Đang tải dữ liệu...
  </div>
</main>

<!-- FOOTER -->
<footer class="bg-surface-container-low w-full py-section-gap px-container-padding grid grid-cols-1 md:grid-cols-4 gap-gutter rounded-t-xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)] mt-auto max-w-max-width mx-auto">
<div class="flex flex-col gap-4 col-span-1">
  <span class="font-display-lg text-headline-md font-extrabold text-primary" id="footerBrand">CreativeHub</span>
  <p class="font-body-md text-body-md text-on-surface-variant">Empowering creativity.</p>
</div>
<div class="flex flex-col gap-3" id="footerLinks"><h4 class="font-label-bold text-label-bold text-on-surface">Links</h4></div>
<div class="col-span-1 md:col-span-4 mt-8 pt-8 border-t border-outline-variant/30 text-center">
  <p class="font-body-md text-body-md text-on-surface-variant text-sm" id="footerCopy">© 2024</p>
</div>
</footer>

<script>
async function loadContentJson() {
  try {
    let r = await fetch('Data/content.json?t=' + Date.now());
    if (!r.ok) r = await fetch('../Data/content.json?t=' + Date.now());
    if (r.ok) { const text = await r.text(); return JSON.parse(text); }
  } catch(e) { console.error(e); }
  return null;
}

function buildMenu(menus) {
  const navMenu = document.getElementById('navMenu');
  if (!navMenu || !menus) return;
  navMenu.innerHTML = '';
  menus.forEach(function(item) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;display:inline-block;';
    const link = document.createElement('a');
    if (item.type === 'fixed' && item.link) link.href = item.link;
    else if (item.slug === 'home') link.href = 'index.html';
    else link.href = 'page.html?slug=' + item.slug;
    link.textContent = item.label;
    link.className = 'font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors hover:scale-105 duration-300';
    if (item.label === 'Portfolio') link.className = 'font-body-md text-body-md text-primary font-bold border-b-2 border-primary pb-1';
    wrapper.appendChild(link);
    if (item.children && item.children.length > 0) {
      const dropdown = document.createElement('div');
      dropdown.className = 'dropdown-menu';
      item.children.forEach(function(child) {
        const childLink = document.createElement('a');
        if (child.type === 'fixed' && child.link) childLink.href = child.link;
        else childLink.href = 'page.html?slug=' + child.slug;
        childLink.textContent = child.label;
        dropdown.appendChild(childLink);
      });
      wrapper.appendChild(dropdown);
    }
    navMenu.appendChild(wrapper);
  });
}

function groupByTag(items) {
  const groups = {};
  items.forEach(function(item) {
    const mainTag = (item.tags && item.tags.length > 0) ? item.tags[0] : 'Khác';
    if (!groups[mainTag]) groups[mainTag] = [];
    groups[mainTag].push(item);
  });
  return groups;
}

function renderPortfolio(data) {
  const items = data.portfolio || [];
  const main = document.getElementById('portfolioMain');
  
  if (!items.length) {
    main.innerHTML = '<div class="text-center py-20 text-on-surface-variant"><span class="material-symbols-outlined text-6xl">grid_view</span><p class="mt-4 text-body-lg">Chưa có dự án nào. Vào <a href="admin/" class="text-primary underline">Admin</a> để thêm.</p></div>';
    return;
  }

  const groups = groupByTag(items);
  const groupNames = Object.keys(groups);
  const firstItem = items[0];

  let html = '';

  // Featured Hero
  html += `<section class="flex flex-col gap-8"><div class="flex justify-between items-end"><h1 class="font-display-lg text-display-lg text-primary">Featured Work</h1></div>`;
  html += `<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">`;
  html += `<div class="lg:col-span-8 bg-surface-container-lowest rounded-[24px] overflow-hidden ambient-shadow-heavy group cursor-pointer relative">`;
  html += `<div class="h-[400px] w-full overflow-hidden relative"><img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="${firstItem.image||''}" alt="${firstItem.title}"/>`;
  html += `<div class="absolute bottom-6 left-6 flex gap-2">${(firstItem.tags||[]).map(function(t,i){const cols=['bg-gradient-lime text-on-secondary-container','bg-surface/90 text-primary backdrop-blur-sm','bg-tertiary-container text-on-tertiary-container'];return '<span class="'+ (cols[i%3]) +' font-label-bold text-label-bold px-4 py-1.5 rounded-full shadow-sm">'+t+'</span>';}).join('')}</div></div>`;
  html += `<div class="p-8 bg-surface-container-lowest relative z-10"><h2 class="font-headline-lg text-headline-lg text-on-surface mb-2 group-hover:text-primary transition-colors">${firstItem.title}</h2><p class="font-body-md text-body-md text-on-surface-variant">${firstItem.desc||''}</p></div></div>`;

  // Side cards (items 1-2)
  html += `<div class="lg:col-span-4 flex flex-col gap-8">`;
  for (let i = 1; i <= 2; i++) {
    if (items[i]) {
      html += `<div class="flex-1 bg-surface-container-lowest rounded-[20px] overflow-hidden ambient-shadow group cursor-pointer relative flex flex-col"><div class="h-[200px] w-full overflow-hidden"><img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" src="${items[i].image||''}" alt="${items[i].title}"/></div><div class="p-6 flex-grow flex flex-col justify-between"><h3 class="font-headline-md text-headline-md text-on-surface mb-2">${items[i].title}</h3><p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">${items[i].desc||''}</p></div></div>`;
    }
  }
  html += `</div></div></section>`;

  // Category sections
  html += `<div class="flex flex-col gap-12">`;
  const borderColors = ['border-primary','border-secondary','border-tertiary','border-error'];
  groupNames.forEach(function(groupName, gi) {
    const groupItems = groups[groupName];
    html += `<section class="flex flex-col gap-6"><div class="flex justify-between items-center"><h2 class="font-display-lg text-headline-lg text-on-surface border-l-4 ${borderColors[gi%4]} pl-4">${groupName}</h2></div>`;
    html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
    groupItems.forEach(function(p) {
      html += `<div class="bg-surface-container-lowest rounded-2xl overflow-hidden ambient-shadow hover:scale-[1.02] transition-transform duration-300"><div class="h-48 overflow-hidden relative"><img class="w-full h-full object-cover" src="${p.image||''}" alt="${p.title}"/><div class="absolute bottom-2 left-2 glass-panel px-3 py-1 rounded-full text-primary font-label-bold text-[10px]">${p.title.substring(0,20)}</div></div><div class="p-5"><h4 class="font-headline-md text-body-lg font-bold mb-2">${p.title}</h4><p class="text-on-surface-variant text-body-md line-clamp-2">${p.desc||''}</p></div></div>`;
    });
    html += `</div></section>`;
  });
  html += `</div>`;

  main.innerHTML = html;
}

async function init() {
  const data = await loadContentJson();
  if (!data) {
    document.getElementById('portfolioMain').innerHTML = '<p class="text-center text-red-500 py-20">Không thể tải dữ liệu.</p>';
    return;
  }
  document.getElementById('navBrand').textContent = data.banner?.name || data.site?.name || 'CreativeHub';
  document.getElementById('footerBrand').textContent = data.footer?.brand || 'CreativeHub';
  document.getElementById('footerCopy').textContent = data.footer?.copyright || '© 2024';
  if (data.menus) buildMenu(data.menus);
  if (data.footer?.links) {
    document.getElementById('footerLinks').innerHTML = '<h4 class="font-label-bold text-label-bold text-on-surface">Links</h4>' + data.footer.links.map(function(l) {
      return '<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="'+l.href+'">'+l.label+'</a>';
    }).join('');
  }
  renderPortfolio(data);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
