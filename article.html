<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đang tải...</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAFA;--bg2:#F9FAFB;--card:#fff;--purple:#7C3AED;--purple-dim:#A78BFA;--purple-glow:rgba(124,58,237,.08);--green:#2d5a0f;--heading:#1E1E2E;--text:#374151;--text2:#4B5563;--text3:#9CA3AF;--border:#E5E7EB;--max-w:800px;--gutter:24px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}

/* Article layout */
.article-hero{position:relative;width:100%;max-height:420px;overflow:hidden}
.article-hero img{width:100%;height:420px;object-fit:cover;display:block}
.article-hero .overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(0,0,0,.05) 50%,rgba(0,0,0,.15) 100%)}
.article-hero .back{position:absolute;top:80px;left:24px;z-index:5;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text);font-size:.8rem;font-weight:600;transition:all .2s}
.article-hero .back:hover{border-color:var(--purple);color:var(--purple)}

.article-container{max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter);position:relative;z-index:2}
.article-header{margin-top:-80px;margin-bottom:32px}
.art-cat{display:inline-block;padding:5px 14px;border-radius:999px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;background:rgba(124,58,237,.08);color:#7C3AED;border:1px solid rgba(124,58,237,.2);margin-bottom:12px}
.article-header h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;color:var(--heading);line-height:1.15;letter-spacing:-.02em;margin-bottom:12px}
.art-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:.82rem;color:var(--text2);margin-bottom:16px}
.art-meta span{display:flex;align-items:center;gap:5px}
.art-meta .material-symbols-outlined{font-size:16px;color:var(--purple-dim)}
.art-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.art-tags span{padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:700;background:rgba(0,0,0,.6);color:var(--text2);border:1px solid var(--border)}

/* Article body content */
.article-body{font-size:1rem;line-height:1.85;color:var(--text);padding-bottom:60px}
.article-body h1,.article-body h2,.article-body h3{color:var(--heading);margin:28px 0 12px;font-weight:800;line-height:1.3}
.article-body h1{font-size:1.6rem}.article-body h2{font-size:1.35rem}.article-body h3{font-size:1.1rem}
.article-body p{margin-bottom:16px}
.article-body a{color:#7C3AED;text-decoration:underline;text-underline-offset:3px}
.article-body a:hover{text-decoration-color:var(--purple)}
.article-body img{max-width:100%;border-radius:12px;margin:20px 0;border:1px solid var(--border)}
.article-body blockquote{border-left:3px solid var(--purple);padding:12px 20px;margin:20px 0;background:rgba(124,58,237,.05);border-radius:0 12px 12px 0;font-style:italic;color:var(--text2)}
.article-body pre,.article-body code{background:#F3F4F6;border:1px solid var(--border);border-radius:8px;font-family:'Fira Code',monospace;font-size:.88rem}
.article-body pre{padding:16px;overflow-x:auto;margin:16px 0}
.article-body code{padding:2px 6px}
.article-body pre code{padding:0;border:none;background:none}
.article-body ul,.article-body ol{padding-left:24px;margin-bottom:16px}
.article-body li{margin-bottom:6px}
.article-body strong{color:#1E1E2E;font-weight:700}

/* Related articles */
.related-section{border-top:1px solid var(--border);padding:40px 0}
.related-title{font-size:1.1rem;font-weight:800;color:var(--heading);margin-bottom:16px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.related-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,transform .2s}
.related-card:hover{border-color:var(--purple-dim);transform:translateY(-2px)}
.related-card img{width:100%;height:120px;object-fit:cover}
.related-card .rc-body{padding:14px}
.related-card h4{font-size:.88rem;font-weight:800;color:var(--heading);margin-bottom:4px;line-height:1.3}
.related-card .rc-meta{font-size:.7rem;color:var(--text3)}

/* No-image fallback */
.no-hero{height:80px}

/* Footer */
.site-footer{border-top:1px solid var(--border);padding:32px 0}
.footer-inner{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto;padding:0 var(--gutter);flex-wrap:wrap;gap:16px}
.footer-brand{font-size:1.1rem;font-weight:800;color:var(--purple)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:.8rem;color:var(--text2);font-weight:600;transition:color .15s}
.footer-links a:hover{color:var(--purple)}
.footer-copy{font-size:.72rem;color:var(--text3)}

/* Empty */
.empty{text-align:center;padding:80px var(--gutter);color:var(--text3)}
.empty a{color:var(--purple)}

@media(max-width:600px){
  .article-hero img{height:260px}
  .article-header{margin-top:-40px}
  .art-meta{gap:10px;font-size:.78rem}
  .footer-inner{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<script src="_nav.js"></script>

<div id="articlePage">
  <div style="text-align:center;padding:120px var(--gutter);color:var(--text3)">Đang tải...</div>
</div>

<footer class="site-footer"><div class="footer-inner"><div class="footer-brand" id="ftBrand"></div><div class="footer-links" id="ftLinks"></div><div class="footer-copy" id="ftCopy"></div></div></footer>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getParam(k){return new URLSearchParams(location.search).get(k)||'';}
async function loadData(){try{var r=await fetch('data/content.json?t='+Date.now());if(r.ok)return r.json();}catch(e){}return null;}

async function init(){
  var slug=getParam('slug'),id=getParam('id');
  var d=await loadData();
  if(!d){document.getElementById('articlePage').innerHTML='<div class="empty">Không thể tải dữ liệu.</div>';return;}

  // Footer
  if(d.footer){document.getElementById('ftBrand').textContent=d.footer.brand||'';document.getElementById('ftCopy').textContent=d.footer.copyright||'';}
  if(d.menus)document.getElementById('ftLinks').innerHTML=d.menus.map(function(m){return '<a href="'+(m.slug==='home'?'index.html':'page.html?slug='+m.slug)+'">'+esc(m.label)+'</a>';}).join('');

  var page=d.pages&&d.pages[slug];
  if(!page){document.getElementById('articlePage').innerHTML='<div class="empty">Trang không tồn tại. <a href="index.html">Về trang chủ</a></div>';return;}

  // Find article by id
  var article=null;
  (page.items||[]).forEach(function(a){if(a.id===id)article=a;});
  if(!article){document.getElementById('articlePage').innerHTML='<div class="empty">Bài viết không tồn tại. <a href="page.html?slug='+esc(slug)+'">Quay lại</a></div>';return;}

  document.title=article.title+' — '+(d.site&&d.site.name||'');

  var html='';

  // Hero image
  if(article.image){
    html+='<div class="article-hero"><img src="'+esc(article.image)+'" alt="'+esc(article.title)+'"><div class="overlay"></div><a href="page.html?slug='+esc(slug)+'" class="back"><span class="material-symbols-outlined" style="font-size:16px">arrow_back</span>Quay lại</a></div>';
  }else{
    html+='<div class="no-hero"></div>';
  }

  // Header
  html+='<div class="article-container"><div class="article-header">';
  if(article.category)html+='<span class="art-cat">'+esc(article.category)+'</span>';
  html+='<h1>'+esc(article.title)+'</h1>';
  html+='<div class="art-meta">';
  if(article.author)html+='<span><span class="material-symbols-outlined">person</span>'+esc(article.author)+'</span>';
  if(article.date)html+='<span><span class="material-symbols-outlined">calendar_today</span>'+esc(article.date)+'</span>';
  if(article.read_time)html+='<span><span class="material-symbols-outlined">schedule</span>'+article.read_time+' phút đọc</span>';
  html+='</div>';
  if(article.tags&&article.tags.length){html+='<div class="art-tags">'+article.tags.map(function(t){return '<span>'+esc(t)+'</span>';}).join('')+'</div>';}
  html+='</div>';

  // Body content
  html+='<div class="article-body">';
  if(article.content){
    html+=article.content;
  }else if(article.excerpt){
    html+='<p>'+esc(article.excerpt)+'</p>';
  }else{
    html+='<p style="color:var(--text3)">Bài viết chưa có nội dung.</p>';
  }
  html+='</div>';

  // Related articles
  var related=(page.items||[]).filter(function(a){return a.id!==id;}).slice(0,3);
  if(related.length){
    html+='<div class="related-section"><div class="related-title">Bài viết liên quan</div><div class="related-grid">';
    related.forEach(function(r){
      var rlink='article.html?slug='+esc(slug)+'&id='+esc(r.id);
      html+='<a href="'+rlink+'" class="related-card">'+(r.image?'<img src="'+esc(r.image)+'" alt="'+esc(r.title)+'">':'')+'<div class="rc-body"><h4>'+esc(r.title)+'</h4><div class="rc-meta">'+esc(r.category||'')+' · '+esc(r.date||'')+'</div></div></a>';
    });
    html+='</div></div>';
  }

  html+='</div>'; // close article-container

  document.getElementById('articlePage').innerHTML=html;
}
init();
</script>
</body>
</html>
