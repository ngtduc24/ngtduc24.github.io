<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài viết</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4648d4;--primary-light:#e1e0ff;--secondary:#4d661c;--secondary-light:#ceee93;--tertiary:#6d5e00;--surface:#f9f9ff;--surface-low:#f0f3ff;--on-surface:#111c2d;--on-surface-variant:#464554;--outline:#767586;--outline-variant:#c7c4d7;--inverse:#263143;--max-w:1280px;--gutter:20px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--surface);color:var(--on-surface);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter)}
.article-layout{display:grid;grid-template-columns:1fr 340px;gap:48px;margin:32px 0 80px;align-items:start}
.article-main img.hero-img{width:100%;height:360px;object-fit:cover;border-radius:20px;margin-bottom:24px}
.article-main .meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--outline);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--outline-variant)}
.article-main .meta span{display:flex;align-items:center;gap:4px}
.article-main .meta .material-symbols-outlined{font-size:16px}
.article-main .category{display:inline-block;padding:4px 14px;border-radius:999px;font-size:12px;font-weight:700;background:var(--primary-light);color:var(--primary);margin-bottom:12px}
.article-main h1{font-size:clamp(1.8rem,3.5vw,2.4rem);font-weight:800;line-height:1.25;margin-bottom:16px}
.article-content{font-size:16px;line-height:1.85;color:var(--on-surface-variant)}
.article-content h2,.article-content h3{color:var(--on-surface);margin:28px 0 12px;font-weight:700}
.article-content h2{font-size:22px}
.article-content h3{font-size:18px}
.article-content p{margin-bottom:16px}
.article-content img{max-width:100%;border-radius:12px;margin:16px 0}
.article-content ul,.article-content ol{margin:12px 0 16px 24px}
.article-content li{margin-bottom:6px}
.article-content blockquote{border-left:3px solid var(--primary);padding:12px 20px;margin:16px 0;background:var(--primary-light);border-radius:0 8px 8px 0;font-style:italic}
.sidebar-section{position:sticky;top:80px}
.sidebar-section h3{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--outline);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--outline-variant)}
.related-card{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(199,196,215,.3);cursor:pointer;transition:background .15s}
.related-card:hover{background:var(--surface-low);margin:0 -8px;padding:10px 8px;border-radius:8px}
.related-card:last-child{border-bottom:none}
.related-card img{width:72px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0}
.related-card .rc-info h4{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px}
.related-card .rc-info .rc-meta{font-size:11px;color:var(--outline)}
.tags-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.tags-list a{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;background:var(--surface-low);color:var(--on-surface-variant);border:1px solid var(--outline-variant);transition:all .15s}
.tags-list a:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--primary);margin-bottom:20px;transition:gap .15s}
.back-link:hover{gap:10px}
.site-footer{background:var(--inverse);border-top:6px solid var(--tertiary);margin-top:80px}
.footer-inner{display:flex;justify-content:space-between;align-items:center;padding:40px var(--gutter);max-width:var(--max-w);margin:0 auto;flex-wrap:wrap;gap:16px}
.footer-brand{font-size:18px;font-weight:800;color:var(--secondary-light)}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{color:rgba(199,196,215,.7);font-weight:700;font-size:13px}
.footer-copy{color:var(--surface);font-size:13px}
@media(max-width:900px){.article-layout{grid-template-columns:1fr;gap:32px}.sidebar-section{position:static}}
@media(max-width:600px){.article-main img.hero-img{height:220px;border-radius:14px}.footer-inner{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<script src="_nav.js"></script>
<main class="wrap">
<div class="article-layout">
  <div class="article-main" id="articleMain"><p style="text-align:center;padding:60px;color:var(--outline)">Đang tải...</p></div>
  <aside class="sidebar-section" id="articleSidebar"></aside>
</div>
</main>
<footer class="site-footer"><div class="footer-inner"><div class="footer-brand" id="ftBrand"></div><div class="footer-links" id="ftLinks"></div><div class="footer-copy" id="ftCopy"></div></div></footer>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function loadData(){try{var r=await fetch('data/content.json?t='+Date.now());if(r.ok)return r.json();}catch(e){}return null;}

async function init(){
  var params=new URLSearchParams(location.search);
  var slug=params.get('slug'),id=params.get('id');
  var d=await loadData();if(!d){document.getElementById('articleMain').innerHTML='<p>Không thể tải dữ liệu.</p>';return;}

  var page=d.pages&&d.pages[slug];
  if(!page||!page.items){document.getElementById('articleMain').innerHTML='<p>Trang không tồn tại.</p>';return;}

  var article=page.items.find(function(a){return a.id===id;});
  if(!article){document.getElementById('articleMain').innerHTML='<p>Bài viết không tồn tại. <a href="page.html?slug='+esc(slug)+'" style="color:var(--primary)">Quay lại</a></p>';return;}

  document.title=article.title+' — '+(d.site&&d.site.name||'');

  // Render article
  var main=document.getElementById('articleMain');
  var html='<a href="page.html?slug='+esc(slug)+'" class="back-link"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>Quay lại '+esc(page.title)+'</a>';
  if(article.image)html+='<img class="hero-img" src="'+esc(article.image)+'" alt="'+esc(article.title)+'">';
  if(article.category)html+='<span class="category">'+esc(article.category)+'</span>';
  html+='<h1>'+esc(article.title)+'</h1>';
  html+='<div class="meta"><span><span class="material-symbols-outlined">person</span>'+esc(article.author)+'</span><span><span class="material-symbols-outlined">calendar_today</span>'+esc(article.date)+'</span><span><span class="material-symbols-outlined">schedule</span>'+(article.read_time||5)+' phút đọc</span></div>';
  html+='<div class="article-content">'+(article.content||'<p>'+esc(article.excerpt)+'</p>')+'</div>';
  main.innerHTML=html;

  // Sidebar: Tags + Related articles
  var sidebar=document.getElementById('articleSidebar');
  var shtml='';
  if(article.tags&&article.tags.length){
    shtml+='<h3>Chủ đề</h3><div class="tags-list">'+article.tags.map(function(t){return '<a href="#">'+esc(t)+'</a>';}).join('')+'</div>';
  }
  // Related: other articles from same page
  var related=page.items.filter(function(a){return a.id!==id;});
  if(related.length){
    shtml+='<h3>Bài viết liên quan</h3>';
    related.slice(0,5).forEach(function(r){
      shtml+='<a href="article.html?slug='+esc(slug)+'&id='+esc(r.id)+'" class="related-card">'+(r.image?'<img src="'+esc(r.image)+'" alt="'+esc(r.title)+'">':'')+'<div class="rc-info"><h4>'+esc(r.title)+'</h4><div class="rc-meta">'+esc(r.author||'')+' · '+(r.read_time||5)+' phút</div></div></a>';
    });
  }
  sidebar.innerHTML=shtml;

  // Footer
  if(d.footer){document.getElementById('ftBrand').textContent=d.footer.brand||'';document.getElementById('ftCopy').textContent=d.footer.copyright||'';}
  if(d.menus)document.getElementById('ftLinks').innerHTML=d.menus.map(function(m){return '<a href="'+(m.slug==='home'?'index.html':'page.html?slug='+m.slug)+'">'+esc(m.label)+'</a>';}).join('');
}
init();
</script>
</body>
</html>
