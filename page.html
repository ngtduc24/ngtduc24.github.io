<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
.glass-panel { background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.4); }
.soft-shadow { box-shadow: 0 20px 40px rgba(70,72,212,0.08); }
.text-gradient { background: linear-gradient(135deg, #4648d4, #c4aa01); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.bg-gradient-vibrant { background: linear-gradient(135deg, #f0f3ff 0%, #dee8ff 50%, #e1e0ff 100%); }
/* Dropdown menu */
.nav-item { position: relative; }
.nav-item .dropdown { display: none; position: absolute; top: 100%; left: 0; min-width: 200px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 8px 0; z-index: 60; }
.nav-item:hover .dropdown { display: block; }
.nav-item .dropdown a { display: block; padding: 10px 20px; color: #111c2d; font-weight: 600; font-size: 14px; white-space: nowrap; text-decoration: none; border-radius: 8px; }

<body class="bg-surface text-on-surface font-body-md antialiased pt-20">

<!-- HEADER (ĐỒNG BỘ VỚI TRANG CHỦ) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-20 mx-auto bg-surface/80 backdrop-blur-md shadow-[0_20px_40px_rgba(70,72,212,0.1)]">
<div class="flex items-center gap-gutter">
  <a href="index.html" class="font-display-lg text-headline-md font-extrabold text-primary" id="navBrand">CreativeHub</a>
</div>
<nav class="hidden md:flex gap-gutter items-center" id="navMenu">
  <!-- Menu sẽ được tải từ content.json -->
</nav>
<div class="flex items-center gap-unit">
  <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
    <span class="material-symbols-outlined">notifications</span>
  </button>
  <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
    <span class="material-symbols-outlined">account_circle</span>
  </button>
  <button class="bg-primary text-on-primary px-4 py-2 rounded-full font-label-bold text-label-bold hover:scale-105 transition-transform duration-200 shadow-md flex items-center justify-center">
    Sign In
  </button>
</div>
</header>

<!-- MAIN CONTENT -->
<main class="w-full max-w-max-width mx-auto flex flex-col gap-section-gap pb-section-gap">
<section class="relative w-full rounded-xl overflow-hidden mt-8 px-container-padding">
  <div class="absolute inset-0 bg-gradient-vibrant rounded-xl -z-10"></div>
  <div class="pt-16 pb-12 px-8 md:px-16 relative z-10">
    <div class="max-w-3xl mx-auto">
      <h1 class="font-display-lg text-headline-lg text-on-surface mb-4" id="pageHeading">Loading...</h1>
      <article id="pageContent" class="prose max-w-none">
        <div class="text-center py-12">
          <span class="material-symbols-outlined text-4xl text-outline animate-spin">progress_activity</span>
          <p class="text-on-surface-variant mt-4">Đang tải nội dung...</p>
        </div>
      </article>
    </div>
  </div>
</section>
</main>

<!-- FOOTER (ĐỒNG BỘ VỚI TRANG CHỦ) -->
<footer class="bg-surface-container-low w-full py-section-gap px-container-padding grid grid-cols-1 md:grid-cols-4 gap-gutter full-width rounded-t-xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)] mx-auto max-w-max-width mt-auto">
<div class="col-span-1">
  <span class="font-display-lg text-headline-md font-extrabold text-primary mb-4 block" id="footerBrand">CreativeHub</span>
  <p class="font-body-md text-body-md text-on-surface-variant" id="footerCopy">© 2024 CreativeHub. All rights reserved.</p>
</div>
<div class="col-span-1 md:col-span-3 flex flex-wrap gap-8 md:justify-end items-start" id="footerLinks">
  <!-- Footer links sẽ được tải từ content.json -->
</div>
</footer>

<script>
// ============================================
// LOAD CONTENT.JSON & BUILD MENU
// ============================================
async function loadContentJson() {
  try {
    const r = await fetch('../Data/content.json?t=' + Date.now());
    if (!r.ok) {
      const r2 = await fetch('Data/content.json?t=' + Date.now());
      if (r2.ok) {
        const text = await r2.text();
        return JSON.parse(text);
      }
      throw new Error('Cannot load content.json');
    }
    const text = await r.text();
    return JSON.parse(text);
  } catch(e) {
    console.error('loadContentJson:', e);
    return null;
  }
}

function getSlugFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug') || 'home';
}

function buildMenu(menus, currentSlug) {
  const navMenu = document.getElementById('navMenu');
  if (!navMenu || !menus) return;
  
  navMenu.innerHTML = '';
  
  menus.forEach(item => {
    const wrapper = document.createElement('div');
    wrapper.className = 'nav-item';
    
    const link = document.createElement('a');
    link.href = item.type === 'page' ? `page.html?slug=${item.slug}` : (item.href || '#');
    link.textContent = item.label;
    link.className = 'text-on-surface-variant hover:text-primary transition-colors hover:scale-105 duration-300 font-label-bold text-label-bold';
    
    // Active state
    if (item.slug === currentSlug) {
      link.className = 'text-primary font-bold border-b-2 border-primary pb-1 hover:scale-105 transition-all duration-300 font-label-bold text-label-bold';
    }
    
    wrapper.appendChild(link);
    
    // Submenu
    if (item.children && item.children.length > 0) {
      const dropdown = document.createElement('div');
      dropdown.className = 'dropdown';
      item.children.forEach(child => {
        const childLink = document.createElement('a');
        childLink.href = child.type === 'page' ? `page.html?slug=${child.slug}` : (child.href || '#');
        childLink.textContent = child.label;
        dropdown.appendChild(childLink);
      });
      wrapper.appendChild(dropdown);
    }
    
    navMenu.appendChild(wrapper);
  });
}

async function initPage() {
  const data = await loadContentJson();
  if (!data) {
    document.getElementById('pageContent').innerHTML = '<p class="text-center text-red-500">Không thể tải dữ liệu. Vui lòng thử lại sau.</p>';
    return;
  }
  
  const slug = getSlugFromUrl();
  
  // Update brand
  document.getElementById('navBrand').textContent = data.site?.name || 'CreativeHub';
  document.getElementById('footerBrand').textContent = data.footer?.brand || data.site?.name || 'CreativeHub';
  document.getElementById('footerCopy').textContent = data.footer?.copyright || '© 2024 CreativeHub';
  
  // Build menu
  if (data.menus) {
    buildMenu(data.menus, slug);
  }
  
  // Footer links
  if (data.footer?.links) {
    document.getElementById('footerLinks').innerHTML = data.footer.links.map(l =>
      `<a class="text-on-surface-variant hover:text-secondary-container transition-colors font-body-md text-body-md" href="${l.href}">${l.label}</a>`
    ).join('');
  }
  
  // Display page content
  const page = data.pages?.[slug];
  if (page) {
    document.getElementById('pageHeading').textContent = page.title;
    document.getElementById('pageContent').innerHTML = page.content || '<p>Chưa có nội dung.</p>';
    document.title = page.title + ' - ' + (data.site?.name || 'CreativeHub');
    if (page.meta?.description) {
      document.getElementById('metaDescription').content = page.meta.description;
    }
  } else if (slug === 'home') {
    document.getElementById('pageHeading').textContent = data.home?.name || 'Trang chủ';
    document.getElementById('pageContent').innerHTML = '<p>Chào mừng đến với trang chủ.</p>';
  } else {
    document.getElementById('pageHeading').textContent = '404 - Không tìm thấy';
    document.getElementById('pageContent').innerHTML = `
      <div class="text-center py-16">
        <span class="material-symbols-outlined text-6xl text-outline">search_off</span>
        <h2 class="text-headline-md mt-4 mb-2">Trang không tồn tại</h2>
        <p class="text-on-surface-variant mb-6">Trang bạn tìm kiếm chưa được tạo hoặc đã bị xóa.</p>
        <a href="index.html" class="inline-block bg-primary text-on-primary px-6 py-3 rounded-full font-label-bold text-label-bold hover:scale-105 transition-transform">Quay về trang chủ</a>
      </div>
    `;
  }
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
