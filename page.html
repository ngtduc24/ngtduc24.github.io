<style>
.glass-panel { background:rgba(255,255,255,0.7); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.3); }
.hero-gradient { background:linear-gradient(135deg,#c0c1ff 0%,#ceee93 100%); }
.inner-glow { box-shadow:inset 0 2px 4px rgba(255,255,255,0.5); }
.ambient-shadow { box-shadow:0 20px 40px -10px rgba(96,99,238,0.15); }
/* Dropdown menu - GIỐNG TRANG CHỦ */
#navMenu > div { position: relative; display: inline-block; }
#navMenu .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; min-width: 200px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 8px 0; z-index: 60; }
#navMenu > div:hover .dropdown-menu { display: block; }
#navMenu .dropdown-menu a { display: block; padding: 10px 20px; color: #111c2d; font-weight: 600; font-size: 14px; white-space: nowrap; text-decoration: none; }
#navMenu .dropdown-menu a:hover { background: #eef2ff; color: #4648d4; }
</style>
</head>
<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">

<!-- NAV - GIỐNG HỆT TRANG CHỦ -->
<nav class="bg-surface/80 backdrop-blur-xl top-0 sticky z-50 shadow-sm border-b border-outline-variant/20">
<div class="flex justify-between items-center px-gutter py-4 w-full max-w-max-width mx-auto">
  <div class="flex items-center gap-8">
    <a class="text-headline-md font-display-lg font-black tracking-tighter text-primary" href="index.html" id="nav-brand">Nguyễn Đức</a>
    <div class="hidden lg:flex items-center gap-1" id="navMenu">
      <!-- Menu sẽ được tải tự động từ Data/content.json -->
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button class="p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface">
      <span class="material-symbols-outlined">search</span>
    </button>
    <a href="index.html#contact" class="hidden sm:block bg-primary hover:bg-primary-container text-on-primary text-label-bold font-label-bold py-2.5 px-6 rounded-full transition-all active:scale-95 shadow-lg shadow-primary/20">Bắt Đầu</a>
    <button class="lg:hidden p-2 rounded-full hover:bg-surface-container" id="menuToggle">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </div>
</div>
</nav>

<!-- MAIN CONTENT -->
<main class="max-w-max-width mx-auto px-gutter pb-section-gap">
  <section class="mt-8 md:mt-12 mb-section-gap">
    <div class="relative rounded-3xl hero-gradient overflow-hidden min-h-[300px] flex items-center p-8 md:p-16 ambient-shadow">
      <div class="absolute top-10 right-10 w-24 h-24 bg-tertiary-fixed rounded-full blur-2xl opacity-60 mix-blend-multiply"></div>
      <div class="absolute bottom-10 left-10 w-32 h-32 bg-primary rounded-full blur-3xl opacity-40 mix-blend-screen"></div>
      <div class="relative z-10 w-full">
        <h1 class="text-display-lg font-display-lg text-on-surface leading-tight mb-4" id="pageHeading">Loading...</h1>
        <article id="pageContent" class="text-body-lg font-body-lg text-on-surface-variant max-w-3xl">
          <div class="flex items-center gap-3 text-on-surface-variant">
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
            Đang tải nội dung...
          </div>
        </article>
      </div>
    </div>
  </section>
</main>

<!-- FOOTER - GIỐNG TRANG CHỦ -->
<footer class="bg-on-surface mt-section-gap border-t-8 border-tertiary-container">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-12 w-full max-w-max-width mx-auto">
  <div class="text-headline-md font-display-lg text-secondary-fixed mb-6 md:mb-0" id="footer-brand">Nguyễn Đức</div>
  <div class="flex flex-wrap justify-center gap-6 md:gap-8 mb-6 md:mb-0" id="footer-links"></div>
  <div class="text-surface-bright text-body-md text-center md:text-right" id="footer-copy">© 2024 Nguyễn Đức. All rights reserved.</div>
</div>
</footer>

<script>
// ============================================
// LOAD CONTENT.JSON & BUILD MENU
// ============================================
async function loadContentJson() {
  try {
    let r = await fetch('Data/content.json?t=' + Date.now());
    if (!r.ok) {
      r = await fetch('../Data/content.json?t=' + Date.now());
      if (!r.ok) throw new Error('Cannot load');
    }
    const text = await r.text();
    return JSON.parse(text);
  } catch(e) {
    console.error('loadContentJson:', e);
    return null;
  }
}

function getSlugFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug') || 'home';
}

function buildMenu(menus, currentSlug) {
  const navMenu = document.getElementById('navMenu');
  if (!navMenu || !menus) return;
  
  navMenu.innerHTML = '';
  
  menus.forEach(function(item) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;display:inline-block;';
    
    const link = document.createElement('a');
    link.href = item.type === 'page' ? 'page.html?slug=' + item.slug : (item.href || '#');
    link.textContent = item.label;
    link.className = 'px-4 py-2 rounded-full text-label-bold font-label-bold text-on-surface-variant hover:bg-surface-container transition-all';
    
    // Active state
    if (item.slug === currentSlug) {
      link.className = 'px-4 py-2 rounded-full text-label-bold font-label-bold text-primary bg-primary-container/10';
    }
    
    wrapper.appendChild(link);
    
    // Submenu
    if (item.children && item.children.length > 0) {
      const dropdown = document.createElement('div');
      dropdown.className = 'dropdown-menu';
      
      item.children.forEach(function(child) {
        const childLink = document.createElement('a');
        childLink.href = child.type === 'page' ? 'page.html?slug=' + child.slug : (child.href || '#');
        childLink.textContent = child.label;
        dropdown.appendChild(childLink);
      });
      
      wrapper.appendChild(dropdown);
    }
    
    navMenu.appendChild(wrapper);
  });
}

async function initPage() {
  const data = await loadContentJson();
  if (!data) {
    document.getElementById('pageContent').innerHTML = '<p class="text-red-500">Không thể tải dữ liệu.</p>';
    return;
  }
  
  const slug = getSlugFromUrl();
  
  // Brand
  const brandName = data.banner?.name || data.site?.name || 'Nguyễn Đức';
  document.getElementById('nav-brand').textContent = brandName;
  document.getElementById('footer-brand').textContent = data.footer?.brand || brandName;
  document.getElementById('footer-copy').textContent = data.footer?.copyright || '© 2024';
  
  // Menu
  if (data.menus) {
    buildMenu(data.menus, slug);
  }
  
  // Footer links
  if (data.footer?.links) {
    document.getElementById('footer-links').innerHTML = data.footer.links.map(function(l) {
      return '<a class="text-surface-variant/70 hover:text-tertiary-fixed transition-colors font-bold" href="' + l.href + '">' + l.label + '</a>';
    }).join('');
  }
  
  // Page content
  const page = data.pages?.[slug];
  if (page) {
    document.getElementById('pageHeading').textContent = page.title;
    document.getElementById('pageContent').innerHTML = page.content || '<p>Chưa có nội dung.</p>';
    document.title = page.title + ' - ' + brandName;
    if (page.meta?.description) {
      document.getElementById('metaDescription').content = page.meta.description;
    }
  } else if (slug === 'home') {
    document.getElementById('pageHeading').textContent = data.home?.name || 'Trang chủ';
    document.getElementById('pageContent').innerHTML = '<p>Chào mừng đến với trang chủ.</p>';
  } else {
    document.getElementById('pageHeading').textContent = '404 - Không tìm thấy';
    document.getElementById('pageContent').innerHTML = '<p>Trang này không tồn tại.</p><a href="index.html" class="text-primary underline mt-4 inline-block">Quay về trang chủ</a>';
  }
  
  // Mobile menu
  document.getElementById('menuToggle').addEventListener('click', function() {
    const menu = document.getElementById('navMenu');
    if (menu.style.display === 'flex') {
      menu.style.display = 'none';
    } else {
      menu.style.display = 'flex';
      menu.style.flexDirection = 'column';
      menu.style.position = 'absolute';
      menu.style.top = '70px';
      menu.style.left = '0';
      menu.style.right = '0';
      menu.style.background = 'white';
      menu.style.padding = '20px';
      menu.style.boxShadow = '0 4px 10px rgba(0,0,0,0.1)';
      menu.style.zIndex = '50';
    }
  });
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
