<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAFA;--bg2:#F9FAFB;--card:#fff;--purple:#7C3AED;--purple-dim:#A78BFA;--purple-glow:rgba(124,58,237,.08);--white:#fff;--text:#1E1E2E;--text2:#4B5563;--text3:#9CA3AF;--border:#E5E7EB;--max-w:1280px;--gutter:24px;--gap:60px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}

/* Page Hero */
.page-hero{margin-top:80px;border-radius:24px;background:linear-gradient(135deg,rgba(45,90,15,.3),rgba(124,58,237,.06));padding:48px 56px;position:relative;overflow:hidden;margin-bottom:var(--gap);border:1px solid var(--border)}
.page-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:var(--purple);border-radius:50%;filter:blur(100px);opacity:.06}
.page-hero .ph-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:12px;border:1px solid}
.page-hero .ph-badge.article{background:var(--purple-glow);color:var(--purple);border-color:rgba(124,58,237,.2)}
.page-hero .ph-badge.project{background:rgba(100,140,255,.12);color:#8ab4ff;border-color:rgba(100,140,255,.2)}
.page-hero .ph-badge.elearning{background:rgba(249,115,22,.1);color:#F97316;border-color:rgba(249,115,22,.2)}
.page-hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.15;color:var(--white);position:relative;z-index:1;margin-bottom:8px}
.page-hero .ph-desc{font-size:16px;color:var(--text2);max-width:600px;position:relative;z-index:1;line-height:1.6}

/* ARTICLE */
.featured-article{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:40px;background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s}
.featured-article:hover{transform:translateY(-3px);border-color:var(--purple-dim)}
.featured-article img{width:100%;height:100%;object-fit:cover;min-height:280px}
.featured-article .fa-body{padding:32px;display:flex;flex-direction:column;justify-content:center}
.featured-article .fa-cat{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--purple);letter-spacing:.05em;margin-bottom:8px}
.featured-article h3{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3;color:var(--white)}
.featured-article .fa-excerpt{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.featured-article .fa-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:12px}
.featured-article .fa-meta span{display:flex;align-items:center;gap:3px}
.featured-article .fa-meta .material-symbols-outlined{font-size:13px;color:var(--purple-dim)}

.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:var(--gap)}
.article-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform .2s,border-color .2s;cursor:pointer}
.article-card:hover{transform:translateY(-3px);border-color:var(--purple-dim)}
.article-card a{display:block;color:inherit}
.article-card img{width:100%;height:160px;object-fit:cover}
.article-card .ac-body{padding:16px}
.article-card .ac-cat{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.article-card h4{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3;color:var(--white)}
.article-card .ac-excerpt{font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.article-card .ac-meta{font-size:11px;color:var(--text3);display:flex;gap:8px}
.article-card .ac-meta span{display:flex;align-items:center;gap:2px}
.article-card .ac-meta .material-symbols-outlined{font-size:13px;color:var(--purple-dim)}

/* PROJECT */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:var(--gap)}
.pg-card{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--border);transition:transform .2s,border-color .2s;cursor:pointer}
.pg-card:hover{transform:translateY(-4px);border-color:var(--purple-dim)}
.pg-card img{width:100%;height:200px;object-fit:cover}
.pg-card .pg-body{padding:20px}
.pg-card h4{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--white)}
.pg-card .pg-client{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px}
.pg-card .pg-desc{font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.pg-card .pg-tags{display:flex;gap:6px;flex-wrap:wrap}
.pg-card .pg-tag{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--purple-glow);color:var(--purple)}

/* Project detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-box .close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.8);backdrop-filter:blur(12px);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:1;transition:border-color .15s}
.modal-box .close:hover{border-color:var(--purple)}
.modal-box img.detail-img{width:100%;height:320px;object-fit:cover;border-radius:20px 20px 0 0}
.modal-box .detail-body{padding:32px}
.modal-box h2{font-size:24px;font-weight:800;margin-bottom:8px;color:var(--white)}
.pd-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.pd-field{font-size:13px;color:var(--text)}
.pd-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.pd-desc{font-size:15px;line-height:1.8;color:var(--text2)}

/* ELEARNING */
.el-featured{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:36px;background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s}
.el-featured:hover{transform:translateY(-3px);border-color:var(--purple-dim)}
.el-featured img{width:100%;height:100%;object-fit:cover;min-height:260px}
.el-featured .ef-body{padding:28px;display:flex;flex-direction:column;justify-content:center}
.el-featured .ef-level{display:inline-block;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;background:var(--purple-glow);color:var(--purple);margin-bottom:10px;width:fit-content}
.el-featured h3{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3;color:var(--white)}
.el-featured .ef-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.el-featured .ef-stats{display:flex;gap:16px;font-size:13px;font-weight:700;color:var(--text3);margin-bottom:16px;flex-wrap:wrap}
.el-featured .ef-stats span{display:flex;align-items:center;gap:4px}
.el-featured .ef-stats .material-symbols-outlined{font-size:16px;color:var(--purple-dim)}
.el-featured .ef-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:999px;background:var(--purple);color:#1E1E2E;font-weight:800;font-size:13px;width:fit-content;transition:box-shadow .2s}
.el-featured .ef-btn:hover{box-shadow:0 0 24px rgba(124,58,237,.2)}

.el-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:var(--gap)}
.el-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform .2s,border-color .2s;cursor:pointer;display:block}
.el-card:hover{transform:translateY(-3px);border-color:var(--purple-dim)}
.el-card img{width:100%;height:160px;object-fit:cover}
.el-card .ec-body{padding:16px}
.el-card .ec-level{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:6px}
.el-card h4{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3;color:var(--white)}
.el-card .ec-desc{font-size:13px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.el-card .ec-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;margin-bottom:10px}
.el-card .ec-meta span{display:flex;align-items:center;gap:3px}
.el-card .ec-meta .material-symbols-outlined{font-size:14px;color:var(--purple-dim)}
.el-card .ec-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border)}
.el-status{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.el-status.open{background:rgba(124,58,237,.12);color:var(--purple);border:1px solid rgba(124,58,237,.15)}
.el-status.upcoming{background:rgba(249,115,22,.1);color:#F97316;border:1px solid rgba(249,115,22,.15)}
.el-status.closed{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.el-price{font-size:14px;font-weight:800;color:var(--white)}

.empty{text-align:center;padding:60px;color:var(--text3);border:2px dashed var(--border);border-radius:20px}
.empty a{color:var(--purple)}
.site-footer{border-top:1px solid var(--border);padding:32px 0;margin-top:var(--gap)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;padding:0 var(--gutter);max-width:var(--max-w);margin:0 auto;flex-wrap:wrap;gap:16px}
.footer-brand{font-size:1.1rem;font-weight:800;color:var(--purple)}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{color:var(--text2);font-weight:600;font-size:.8rem;transition:color .15s}
.footer-links a:hover{color:var(--purple)}
.footer-copy{color:var(--text3);font-size:.72rem}
@media(max-width:768px){.page-hero{padding:32px 24px;margin-top:70px}.featured-article,.el-featured{grid-template-columns:1fr}.project-grid{grid-template-columns:1fr 1fr}.footer-inner{flex-direction:column;text-align:center}}
@media(max-width:500px){.project-grid,.article-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="_nav.js"></script>
<main class="wrap" id="pageMain"><div style="text-align:center;padding:80px;color:var(--text3)">Đang tải...</div></main>
<div class="modal-overlay" id="projectOverlay"><div class="modal-box" id="projectDetail"></div></div>
<footer class="site-footer"><div class="footer-inner"><div class="footer-brand" id="ftBrand"></div><div class="footer-links" id="ftLinks"></div><div class="footer-copy" id="ftCopy"></div></div></footer>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getSlug(){return new URLSearchParams(location.search).get('slug')||'';}
async function loadData(){try{var r=await fetch('data/content.json?t='+Date.now());if(r.ok)return r.json();}catch(e){}return null;}
var _slug='',_pageData=null;

function renderArticlePage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có bài viết. <a href="admin/">Thêm từ Admin</a>.</div>';
  var featured=items.filter(function(a){return a.featured;});var rest=items.filter(function(a){return !a.featured;});
  if(!featured.length){featured=[items[0]];rest=items.slice(1);}
  var html='';var f=featured[0];
  var link='article.html?slug='+esc(_slug)+'&id='+esc(f.id);
  html+='<a href="'+link+'" class="featured-article">'+(f.image?'<img src="'+esc(f.image)+'" alt="'+esc(f.title)+'">':'')+'<div class="fa-body"><div class="fa-cat">'+esc(f.category||'Bài viết')+'</div><h3>'+esc(f.title)+'</h3><p class="fa-excerpt">'+esc(f.excerpt)+'</p><div class="fa-meta"><span><span class="material-symbols-outlined" style="font-size:14px">person</span>'+esc(f.author)+'</span><span><span class="material-symbols-outlined" style="font-size:14px">calendar_today</span>'+esc(f.date)+'</span><span><span class="material-symbols-outlined" style="font-size:14px">schedule</span>'+(f.read_time||5)+' phút đọc</span></div></div></a>';
  var all=featured.slice(1).concat(rest);
  if(all.length){html+='<h3 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--white)">Tất cả bài viết</h3><div class="article-grid">';
  all.forEach(function(a){var alink='article.html?slug='+esc(_slug)+'&id='+esc(a.id);html+='<div class="article-card"><a href="'+alink+'">'+(a.image?'<img src="'+esc(a.image)+'" alt="'+esc(a.title)+'">':'')+'<div class="ac-body"><div class="ac-cat">'+esc(a.category||'')+'</div><h4>'+esc(a.title)+'</h4><p class="ac-excerpt">'+esc(a.excerpt)+'</p><div class="ac-meta"><span><span class="material-symbols-outlined" style="font-size:13px">person</span>'+esc(a.author)+'</span><span><span class="material-symbols-outlined" style="font-size:13px">schedule</span>'+(a.read_time||5)+' phút</span></div></div></a></div>';});html+='</div>';}
  return html;
}

function renderProjectPage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có dự án. <a href="admin/">Thêm từ Admin</a>.</div>';
  var html='<div class="project-grid">';
  items.forEach(function(p){var tags=(p.tags||[]).map(function(t){return '<span class="pg-tag">'+esc(t)+'</span>';}).join('');html+='<div class="pg-card" onclick="openProject(\''+p.id+'\')">'+(p.image?'<img src="'+esc(p.image)+'" alt="'+esc(p.title)+'">':'')+'<div class="pg-body"><h4>'+esc(p.title)+'</h4>'+(p.client?'<div class="pg-client">'+esc(p.client)+'</div>':'')+'<p class="pg-desc">'+esc(p.description)+'</p><div class="pg-tags">'+tags+'</div></div></div>';});
  html+='</div>';return html;
}
function openProject(id){
  var p=_pageData.items.find(function(x){return x.id===id;});if(!p)return;
  var d=document.getElementById('projectDetail');
  var tags=(p.tags||[]).map(function(t){return '<span style="padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;background:var(--purple-glow);color:var(--purple)">'+esc(t)+'</span>';}).join(' ');
  d.innerHTML='<button class="close" onclick="closeProject()">✕</button>'+(p.image?'<img class="detail-img" src="'+esc(p.image)+'" alt="'+esc(p.title)+'">':'')+'<div class="detail-body"><h2>'+esc(p.title)+'</h2><div class="pd-meta"><div class="pd-field"><div class="pd-label">Khách hàng</div>'+esc(p.client||'N/A')+'</div><div class="pd-field"><div class="pd-label">Danh mục</div>'+esc(p.category||'N/A')+'</div><div class="pd-field"><div class="pd-label">Thời gian</div>'+esc(p.date||'N/A')+'</div><div class="pd-field"><div class="pd-label">Tags</div>'+tags+'</div></div><div class="pd-desc">'+esc(p.description)+'</div>'+(p.link&&p.link!=='#'?'<a href="'+esc(p.link)+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:10px 24px;border-radius:999px;background:var(--purple);color:#1E1E2E;font-weight:800;font-size:13px">Xem dự án <span class="material-symbols-outlined" style="font-size:16px">open_in_new</span></a>':'')+'</div>';
  document.getElementById('projectOverlay').classList.add('open');
}
function closeProject(){document.getElementById('projectOverlay').classList.remove('open');}
document.getElementById('projectOverlay').addEventListener('click',function(e){if(e.target===this)closeProject();});

function renderElearningPage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có khóa học. <a href="admin/">Thêm từ Admin</a>.</div>';
  var featured=items.filter(function(c){return c.featured;});var rest=items.filter(function(c){return !c.featured;});
  if(!featured.length){featured=[items[0]];rest=items.slice(1);}
  var html='';var f=featured[0];
  var sCls=f.status==='open'?'open':(f.status==='upcoming'?'upcoming':'closed');
  var sTxt=f.status==='open'?'Đang mở':(f.status==='upcoming'?'Sắp khai giảng':'Đã đóng');
  var cLink='course.html?slug='+esc(_slug)+'&id='+esc(f.id);
  var lessonCount=(f.lessons&&f.lessons.length)||f.lessons_count||0;
  html+='<a href="'+cLink+'" class="el-featured">'+(f.image?'<img src="'+esc(f.image)+'" alt="'+esc(f.title)+'">':'')+'<div class="ef-body"><div class="ef-level">'+esc(f.level||'Tất cả trình độ')+'</div><h3>'+esc(f.title)+'</h3><p class="ef-desc">'+esc(f.description)+'</p><div class="ef-stats"><span><span class="material-symbols-outlined" style="font-size:16px">menu_book</span>'+lessonCount+' bài học</span><span><span class="material-symbols-outlined" style="font-size:16px">schedule</span>'+esc(f.duration)+'</span><span class="el-status '+sCls+'">'+sTxt+'</span></div><span class="ef-btn">Vào học <span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span></span></div></a>';
  var all=featured.slice(1).concat(rest);
  if(all.length){html+='<h3 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--white)">Tất cả khóa học</h3><div class="el-grid">';
  all.forEach(function(c){var sc=c.status==='open'?'open':(c.status==='upcoming'?'upcoming':'closed');var st=c.status==='open'?'Đang mở':(c.status==='upcoming'?'Sắp khai giảng':'Đã đóng');var cl='course.html?slug='+esc(_slug)+'&id='+esc(c.id);var lc=(c.lessons&&c.lessons.length)||c.lessons_count||0;html+='<a href="'+cl+'" class="el-card">'+(c.image?'<img src="'+esc(c.image)+'" alt="'+esc(c.title)+'">':'')+'<div class="ec-body"><div class="ec-level">'+esc(c.level||'')+'</div><h4>'+esc(c.title)+'</h4><p class="ec-desc">'+esc(c.description)+'</p><div class="ec-meta"><span><span class="material-symbols-outlined" style="font-size:14px">menu_book</span>'+lc+' bài</span><span><span class="material-symbols-outlined" style="font-size:14px">schedule</span>'+esc(c.duration)+'</span></div><div class="ec-footer"><span class="el-status '+sc+'">'+st+'</span><span class="el-price">'+esc(c.price||'')+'</span></div></div></a>';});html+='</div>';}
  return html;
}

async function init(){
  _slug=getSlug();
  if(!_slug||_slug==='home'){location.href='index.html';return;}
  var d=await loadData();if(!d){document.getElementById('pageMain').innerHTML='<div class="empty">Không thể tải dữ liệu.</div>';return;}
  var page=d.pages&&d.pages[_slug];
  if(!page){document.getElementById('pageMain').innerHTML='<div class="empty">Trang "'+esc(_slug)+'" không tồn tại. <a href="index.html">Về trang chủ</a></div>';return;}
  _pageData=page;
  document.title=(page.title||_slug)+' — '+(d.site&&d.site.name||'');
  var typeIcons={article:'article',project:'grid_view',elearning:'school'};
  var typeLabels={article:'Bài viết',project:'Portfolio',elearning:'Khóa học'};
  var pt=page.page_type||'article';
  var html='<section class="page-hero"><span class="ph-badge '+pt+'"><span class="material-symbols-outlined" style="font-size:15px">'+(typeIcons[pt]||'description')+'</span>'+(typeLabels[pt]||'Trang')+'</span><h1>'+esc(page.title)+'</h1><p class="ph-desc">'+esc(page.description)+'</p></section>';
  if(pt==='article')html+=renderArticlePage(page);
  else if(pt==='project')html+=renderProjectPage(page);
  else if(pt==='elearning')html+=renderElearningPage(page);
  document.getElementById('pageMain').innerHTML=html;
  // Auto-open project detail if id param present
  var detailId=new URLSearchParams(location.search).get('id');
  if(detailId&&pt==='project'){setTimeout(function(){openProject(detailId);},200);}
  // Auto-scroll to course if id param present  
  if(detailId&&pt==='elearning'){
    var course=page.items.find(function(c){return c.id===detailId;});
    if(course){document.title=course.title+' — '+(d.site&&d.site.name||'');}
  }
  if(d.footer){document.getElementById('ftBrand').textContent=d.footer.brand||'';document.getElementById('ftCopy').textContent=d.footer.copyright||'';}
  if(d.menus)document.getElementById('ftLinks').innerHTML=d.menus.map(function(m){return '<a href="'+(m.slug==='home'?'index.html':'page.html?slug='+m.slug)+'">'+esc(m.label)+'</a>';}).join('');
}
init();
</script>
</body>
</html>
