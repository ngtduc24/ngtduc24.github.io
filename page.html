<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4648d4;--primary-light:#e1e0ff;--primary-dim:#c0c1ff;--secondary:#4d661c;--secondary-light:#ceee93;--tertiary:#6d5e00;--tertiary-light:#ffe24c;--surface:#f9f9ff;--surface-low:#f0f3ff;--surface-container:#e7eeff;--on-surface:#111c2d;--on-surface-variant:#464554;--outline:#767586;--outline-variant:#c7c4d7;--inverse:#263143;--inverse-text:#ecf1ff;--max-w:1280px;--gutter:20px;--gap:60px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--surface);color:var(--on-surface);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter)}

.page-hero{margin-top:24px;border-radius:24px;background:linear-gradient(135deg,var(--primary-dim),var(--secondary-light));padding:48px 56px;position:relative;overflow:hidden;box-shadow:0 16px 36px rgba(70,72,212,.1);margin-bottom:var(--gap)}
.page-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:var(--primary);border-radius:50%;filter:blur(80px);opacity:.15}
.page-hero .ph-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;margin-bottom:12px}
.page-hero .ph-badge.article{background:var(--secondary)}
.page-hero .ph-badge.project{background:var(--primary)}
.page-hero .ph-badge.elearning{background:var(--tertiary)}
.page-hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;line-height:1.15;color:var(--on-surface);position:relative;z-index:1;margin-bottom:8px}
.page-hero .ph-desc{font-size:16px;color:var(--on-surface-variant);max-width:600px;position:relative;z-index:1;line-height:1.6}

/* ═══ ARTICLE ═══ */
.featured-article{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:40px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 28px rgba(70,72,212,.06);border:1px solid var(--outline-variant);cursor:pointer;transition:transform .2s,box-shadow .2s}
.featured-article:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(70,72,212,.12)}
.featured-article img{width:100%;height:100%;object-fit:cover;min-height:280px}
.featured-article .fa-body{padding:32px;display:flex;flex-direction:column;justify-content:center}
.featured-article .fa-cat{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--primary);letter-spacing:.05em;margin-bottom:8px}
.featured-article h3{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3}
.featured-article .fa-excerpt{font-size:14px;color:var(--on-surface-variant);line-height:1.6;margin-bottom:16px}
.featured-article .fa-meta{font-size:12px;color:var(--outline);display:flex;align-items:center;gap:12px}
.featured-article .fa-meta span{display:flex;align-items:center;gap:3px}

.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:var(--gap)}
.article-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--outline-variant);transition:transform .2s,box-shadow .2s;cursor:pointer}
.article-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(70,72,212,.1)}
.article-card a{display:block}
.article-card img{width:100%;height:160px;object-fit:cover}
.article-card .ac-body{padding:16px}
.article-card .ac-cat{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
.article-card h4{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.article-card .ac-excerpt{font-size:13px;color:var(--on-surface-variant);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.article-card .ac-meta{font-size:11px;color:var(--outline);display:flex;gap:8px}
.article-card .ac-meta span{display:flex;align-items:center;gap:2px}

/* ═══ PROJECT ═══ */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:var(--gap)}
.pg-card{background:#fff;border-radius:20px;overflow:hidden;border:1px solid var(--outline-variant);transition:transform .2s,box-shadow .2s;cursor:pointer}
.pg-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(70,72,212,.12)}
.pg-card img{width:100%;height:200px;object-fit:cover}
.pg-card .pg-body{padding:20px}
.pg-card h4{font-size:16px;font-weight:700;margin-bottom:4px}
.pg-card .pg-client{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px}
.pg-card .pg-desc{font-size:13px;color:var(--on-surface-variant);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.pg-card .pg-tags{display:flex;gap:6px;flex-wrap:wrap}
.pg-card .pg-tag{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary)}

/* Project detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-box .close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:999px;border:none;background:rgba(0,0,0,.5);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:1}
.modal-box img.detail-img{width:100%;height:320px;object-fit:cover;border-radius:20px 20px 0 0}
.modal-box .detail-body{padding:32px}
.modal-box h2{font-size:24px;font-weight:800;margin-bottom:8px}
.pd-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--outline-variant)}
.pd-field{font-size:13px}
.pd-label{font-size:11px;font-weight:700;color:var(--outline);text-transform:uppercase;margin-bottom:2px}
.pd-desc{font-size:15px;line-height:1.8;color:var(--on-surface-variant)}

/* ═══ ELEARNING ═══ */
.el-featured{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:36px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 28px rgba(70,72,212,.06);border:1px solid var(--outline-variant);cursor:pointer;transition:transform .2s,box-shadow .2s}
.el-featured:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(70,72,212,.12)}
.el-featured img{width:100%;height:100%;object-fit:cover;min-height:260px}
.el-featured .ef-body{padding:28px;display:flex;flex-direction:column;justify-content:center}
.el-featured .ef-level{display:inline-block;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary);margin-bottom:10px;width:fit-content}
.el-featured h3{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3}
.el-featured .ef-desc{font-size:14px;color:var(--on-surface-variant);line-height:1.6;margin-bottom:16px}
.el-featured .ef-stats{display:flex;gap:16px;font-size:13px;font-weight:700;color:var(--outline);margin-bottom:16px;flex-wrap:wrap}
.el-featured .ef-stats span{display:flex;align-items:center;gap:4px}
.el-featured .ef-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:999px;background:var(--primary);color:#fff;font-weight:700;font-size:13px;width:fit-content}
.el-featured .ef-btn:hover{background:#3537b8}

.el-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:var(--gap)}
.el-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--outline-variant);transition:transform .2s,box-shadow .2s;cursor:pointer}
.el-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(70,72,212,.1)}
.el-card img{width:100%;height:160px;object-fit:cover}
.el-card .ec-body{padding:16px}
.el-card .ec-level{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:6px}
.el-card h4{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.el-card .ec-desc{font-size:13px;color:var(--on-surface-variant);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.el-card .ec-meta{font-size:11px;color:var(--outline);display:flex;gap:10px;margin-bottom:10px}
.el-card .ec-meta span{display:flex;align-items:center;gap:3px}
.el-card .ec-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--outline-variant)}
.el-status{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.el-status.open{background:var(--secondary-light);color:var(--secondary)}
.el-status.upcoming{background:var(--primary-light);color:var(--primary)}
.el-status.closed{background:#eee;color:#999}
.el-price{font-size:14px;font-weight:800;color:var(--on-surface)}
.el-lessons{font-size:12px;color:var(--outline);margin-top:8px;display:flex;align-items:center;gap:4px}

.empty{text-align:center;padding:60px;color:var(--outline);border:2px dashed var(--outline-variant);border-radius:20px}
.empty a{color:var(--primary)}
.site-footer{background:var(--inverse);border-top:6px solid var(--tertiary);margin-top:var(--gap)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;padding:40px var(--gutter);max-width:var(--max-w);margin:0 auto;flex-wrap:wrap;gap:16px}
.footer-brand{font-size:18px;font-weight:800;color:var(--secondary-light)}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{color:rgba(199,196,215,.7);font-weight:700;font-size:13px}
.footer-copy{color:var(--surface);font-size:13px}
@media(max-width:768px){.page-hero{padding:32px 24px}.featured-article,.el-featured{grid-template-columns:1fr}.project-grid{grid-template-columns:1fr 1fr}.footer-inner{flex-direction:column;text-align:center}}
@media(max-width:500px){.project-grid,.article-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="_nav.js"></script>
<main class="wrap" id="pageMain"><div style="text-align:center;padding:80px;color:var(--outline)">Đang tải...</div></main>
<div class="modal-overlay" id="projectOverlay"><div class="modal-box" id="projectDetail"></div></div>
<footer class="site-footer"><div class="footer-inner"><div class="footer-brand" id="ftBrand"></div><div class="footer-links" id="ftLinks"></div><div class="footer-copy" id="ftCopy"></div></div></footer>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getSlug(){return new URLSearchParams(location.search).get('slug')||'';}
async function loadData(){try{var r=await fetch('data/content.json?t='+Date.now());if(r.ok)return r.json();}catch(e){}return null;}
var _slug='',_pageData=null;

// ═══ ARTICLE ═══
function renderArticlePage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có bài viết. <a href="admin/">Thêm từ Admin</a>.</div>';
  var featured=items.filter(function(a){return a.featured;});
  var rest=items.filter(function(a){return !a.featured;});
  if(!featured.length){featured=[items[0]];rest=items.slice(1);}
  var html='';
  // Featured
  var f=featured[0];
  var link='article.html?slug='+esc(_slug)+'&id='+esc(f.id);
  html+='<a href="'+link+'" class="featured-article">'+(f.image?'<img src="'+esc(f.image)+'" alt="'+esc(f.title)+'">':'')+'<div class="fa-body"><div class="fa-cat">'+esc(f.category||'Bài viết')+'</div><h3>'+esc(f.title)+'</h3><p class="fa-excerpt">'+esc(f.excerpt)+'</p><div class="fa-meta"><span><span class="material-symbols-outlined" style="font-size:14px">person</span>'+esc(f.author)+'</span><span><span class="material-symbols-outlined" style="font-size:14px">calendar_today</span>'+esc(f.date)+'</span><span><span class="material-symbols-outlined" style="font-size:14px">schedule</span>'+(f.read_time||5)+' phút đọc</span></div></div></a>';
  // All articles
  var all=featured.slice(1).concat(rest);
  if(all.length){
    html+='<h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Tất cả bài viết</h3><div class="article-grid">';
    all.forEach(function(a){
      var alink='article.html?slug='+esc(_slug)+'&id='+esc(a.id);
      html+='<div class="article-card"><a href="'+alink+'">'+(a.image?'<img src="'+esc(a.image)+'" alt="'+esc(a.title)+'">':'')+'<div class="ac-body"><div class="ac-cat">'+esc(a.category||'')+'</div><h4>'+esc(a.title)+'</h4><p class="ac-excerpt">'+esc(a.excerpt)+'</p><div class="ac-meta"><span><span class="material-symbols-outlined" style="font-size:13px">person</span>'+esc(a.author)+'</span><span><span class="material-symbols-outlined" style="font-size:13px">schedule</span>'+(a.read_time||5)+' phút</span></div></div></a></div>';
    });
    html+='</div>';
  }
  return html;
}

// ═══ PROJECT ═══
function renderProjectPage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có dự án. <a href="admin/">Thêm từ Admin</a>.</div>';
  var html='<div class="project-grid">';
  items.forEach(function(p){
    var tags=(p.tags||[]).map(function(t){return '<span class="pg-tag">'+esc(t)+'</span>';}).join('');
    html+='<div class="pg-card" onclick="openProject(\''+p.id+'\')">'+(p.image?'<img src="'+esc(p.image)+'" alt="'+esc(p.title)+'">':'')+'<div class="pg-body"><h4>'+esc(p.title)+'</h4>'+(p.client?'<div class="pg-client">'+esc(p.client)+'</div>':'')+'<p class="pg-desc">'+esc(p.description)+'</p><div class="pg-tags">'+tags+'</div></div></div>';
  });
  html+='</div>';return html;
}
function openProject(id){
  var p=_pageData.items.find(function(x){return x.id===id;});if(!p)return;
  var d=document.getElementById('projectDetail');
  var tags=(p.tags||[]).map(function(t){return '<span style="padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;background:var(--primary-light);color:var(--primary)">'+esc(t)+'</span>';}).join(' ');
  d.innerHTML='<button class="close" onclick="closeProject()">✕</button>'+(p.image?'<img class="detail-img" src="'+esc(p.image)+'" alt="'+esc(p.title)+'">':'')+'<div class="detail-body"><h2>'+esc(p.title)+'</h2><div class="pd-meta"><div class="pd-field"><div class="pd-label">Khách hàng</div>'+esc(p.client||'N/A')+'</div><div class="pd-field"><div class="pd-label">Danh mục</div>'+esc(p.category||'N/A')+'</div><div class="pd-field"><div class="pd-label">Thời gian</div>'+esc(p.date||'N/A')+'</div><div class="pd-field"><div class="pd-label">Tags</div>'+tags+'</div></div><div class="pd-desc">'+esc(p.description)+'</div>'+(p.link&&p.link!=='#'?'<a href="'+esc(p.link)+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:10px 24px;border-radius:999px;background:var(--primary);color:#fff;font-weight:700;font-size:13px">Xem dự án <span class="material-symbols-outlined" style="font-size:16px">open_in_new</span></a>':'')+'</div>';
  document.getElementById('projectOverlay').classList.add('open');
}
function closeProject(){document.getElementById('projectOverlay').classList.remove('open');}
document.getElementById('projectOverlay').addEventListener('click',function(e){if(e.target===this)closeProject();});

// ═══ ELEARNING ═══
function renderElearningPage(page){
  var items=page.items||[];if(!items.length)return '<div class="empty">Chưa có khóa học. <a href="admin/">Thêm từ Admin</a>.</div>';
  var featured=items.filter(function(c){return c.featured;});
  var rest=items.filter(function(c){return !c.featured;});
  if(!featured.length){featured=[items[0]];rest=items.slice(1);}
  var html='';
  var f=featured[0];
  var sCls=f.status==='open'?'open':(f.status==='upcoming'?'upcoming':'closed');
  var sTxt=f.status==='open'?'Đang mở':(f.status==='upcoming'?'Sắp khai giảng':'Đã đóng');
  var cLink='course.html?slug='+esc(_slug)+'&id='+esc(f.id);
  var lessonCount=(f.lessons&&f.lessons.length)||f.lessons_count||0;
  html+='<a href="'+cLink+'" class="el-featured">'+(f.image?'<img src="'+esc(f.image)+'" alt="'+esc(f.title)+'">':'')+'<div class="ef-body"><div class="ef-level">'+esc(f.level||'Tất cả trình độ')+'</div><h3>'+esc(f.title)+'</h3><p class="ef-desc">'+esc(f.description)+'</p><div class="ef-stats"><span><span class="material-symbols-outlined" style="font-size:16px">menu_book</span>'+lessonCount+' bài học</span><span><span class="material-symbols-outlined" style="font-size:16px">schedule</span>'+esc(f.duration)+'</span><span class="el-status '+sCls+'">'+sTxt+'</span></div><span class="ef-btn">Vào học <span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span></span></div></a>';
  var all=featured.slice(1).concat(rest);
  if(all.length){
    html+='<h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Tất cả khóa học</h3><div class="el-grid">';
    all.forEach(function(c){
      var sc=c.status==='open'?'open':(c.status==='upcoming'?'upcoming':'closed');
      var st=c.status==='open'?'Đang mở':(c.status==='upcoming'?'Sắp khai giảng':'Đã đóng');
      var cl='course.html?slug='+esc(_slug)+'&id='+esc(c.id);
      var lc=(c.lessons&&c.lessons.length)||c.lessons_count||0;
      html+='<a href="'+cl+'" class="el-card">'+(c.image?'<img src="'+esc(c.image)+'" alt="'+esc(c.title)+'">':'')+'<div class="ec-body"><div class="ec-level">'+esc(c.level||'')+'</div><h4>'+esc(c.title)+'</h4><p class="ec-desc">'+esc(c.description)+'</p><div class="ec-meta"><span><span class="material-symbols-outlined" style="font-size:14px">menu_book</span>'+lc+' bài</span><span><span class="material-symbols-outlined" style="font-size:14px">schedule</span>'+esc(c.duration)+'</span></div><div class="ec-footer"><span class="el-status '+sc+'">'+st+'</span><span class="el-price">'+esc(c.price||'')+'</span></div></div></a>';
    });
    html+='</div>';
  }
  return html;
}

// ═══ INIT ═══
async function init(){
  _slug=getSlug();
  if(!_slug||_slug==='home'){location.href='index.html';return;}
  var d=await loadData();if(!d){document.getElementById('pageMain').innerHTML='<div class="empty">Không thể tải dữ liệu.</div>';return;}
  var page=d.pages&&d.pages[_slug];
  if(!page){document.getElementById('pageMain').innerHTML='<div class="empty">Trang "'+esc(_slug)+'" không tồn tại. <a href="index.html">Về trang chủ</a></div>';return;}
  _pageData=page;
  document.title=(page.title||_slug)+' — '+(d.site&&d.site.name||'');
  var typeIcons={article:'article',project:'grid_view',elearning:'school'};
  var typeLabels={article:'Bài viết',project:'Portfolio',elearning:'Khóa học'};
  var pt=page.page_type||'article';
  var html='<section class="page-hero"><span class="ph-badge '+pt+'"><span class="material-symbols-outlined" style="font-size:15px">'+(typeIcons[pt]||'description')+'</span>'+(typeLabels[pt]||'Trang')+'</span><h1>'+esc(page.title)+'</h1><p class="ph-desc">'+esc(page.description)+'</p></section>';
  if(pt==='article')html+=renderArticlePage(page);
  else if(pt==='project')html+=renderProjectPage(page);
  else if(pt==='elearning')html+=renderElearningPage(page);
  document.getElementById('pageMain').innerHTML=html;
  if(d.footer){document.getElementById('ftBrand').textContent=d.footer.brand||'';document.getElementById('ftCopy').textContent=d.footer.copyright||'';}
  if(d.menus)document.getElementById('ftLinks').innerHTML=d.menus.map(function(m){return '<a href="'+(m.slug==='home'?'index.html':'page.html?slug='+m.slug)+'">'+esc(m.label)+'</a>';}).join('');
}
init();
</script>
</body>
</html>
